<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Mass Report Tool</title>
<style>
  /* ---- GLOBAL RESET & BASE ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    font-weight: 300; color: #fff; background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
    background-attachment: fixed; overflow-x: hidden;
  }
  body {
    display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh;
  }

  /* ---- LIQUID-GLASS CONTAINER MIXIN (reused via class) ---- */
  .glass-panel {
    background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37); padding: 24px; width: 100%; max-width: 640px;
  }

  /* ---- TOP BAR: SESSION ID ---- */
  .top-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px; width: 100%; max-width: 640px;
  }
  .top-bar label { font-size: 13px; font-weight: 400; white-space: nowrap; opacity: 0.8; }
  .top-bar input {
    flex: 1; padding: 12px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s; backdrop-filter: blur(8px);
  }
  .top-bar input:focus { border-color: rgba(168, 140, 209, 0.8); box-shadow: 0 0 0 3px rgba(168,140,209,0.15); }
  .top-bar input::placeholder { color: rgba(255,255,255,0.35); }

  /* ---- TABS ---- */
  .tab-nav { display: flex; gap: 0; margin-bottom: 0; width: 100%; max-width: 640px; }
  .tab-btn {
    flex: 1; padding: 14px 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55); cursor: pointer; font-size: 15px; font-weight: 400;
    transition: all 0.3s; backdrop-filter: blur(10px); text-align: center; letter-spacing: 0.02em;
  }
  .tab-btn:first-child { border-radius: 20px 0 0 0; border-right: none; }
  .tab-btn:last-child { border-radius: 0 20px 0 0; border-left: none; }
  .tab-btn.active {
    background: rgba(255,255,255,0.12); color: #fff; font-weight: 500;
    border-bottom: 2px solid #a18cd1; box-shadow: 0 -4px 20px rgba(161,140,209,0.25);
  }
  .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }

  /* ---- TAB CONTENT PANELS ---- */
  .tab-content { display: none; }
  .tab-content.visible { display: block; }
  .content-wrapper {
    border-radius: 0 0 24px 24px; border-top: none;
    background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15); border-top: none;
    box-shadow: 0 12px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 640px;
  }

  /* ---- FORM ELEMENTS ---- */
  .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-row label { font-size: 13px; font-weight: 400; opacity: 0.8; align-self: center; white-space: nowrap; }
  .form-row input {
    flex: 1; min-width: 140px; padding: 11px 14px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06);
    color: #fff; font-size: 13px; outline: none; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-row input:focus { border-color: rgba(161,140,209,0.7); box-shadow: 0 0 0 3px rgba(161,140,209,0.12); }
  .form-row input::placeholder { color: rgba(255,255,255,0.3); }

  /* ---- BUTTONS ---- */
  .btn {
    padding: 12px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; font-weight: 400;
    letter-spacing: 0.03em; transition: all 0.3s; backdrop-filter: blur(8px);
    text-transform: uppercase; user-select: none;
  }
  .btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-start { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
  .btn-start:hover:not(:disabled) { background: rgba(161,140,209,0.4); box-shadow: 0 0 24px rgba(161,140,209,0.3); }
  .btn-stop { background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.45); }
  .btn-stop:hover:not(:disabled) { background: rgba(255,100,100,0.35); box-shadow: 0 0 24px rgba(255,100,100,0.25); }
  .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }

  /* ---- PROGRESS BAR ---- */
  .progress-container { margin-bottom: 16px; }
  .progress-label { font-size: 12px; opacity: 0.7; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track {
    height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 10px; width: 0%;
    background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 50%, #a18cd1 100%);
    background-size: 200% 100%; animation: shimmer 2s linear infinite;
    transition: width 0.35s ease;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ---- STATUS LOG ---- */
  .log-container {
    height: 240px; overflow-y: auto; border-radius: 16px; padding: 12px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; line-height: 1.6;
    margin-bottom: 16px; word-break: break-all;
  }
  .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .log-entry.success { color: #7ee8a0; }
  .log-entry.error { color: #f87c7c; }
  .log-entry.info { color: #a0c4ff; }
  .log-timestamp { opacity: 0.5; margin-right: 8px; font-size: 10px; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 500px) {
    .form-row { flex-direction: column; }
    .top-bar { flex-direction: column; align-items: stretch; }
    .tab-btn { font-size: 13px; padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- ============ TOP BAR: SESSION ID ============ -->
<div class="top-bar glass-panel" style="border-radius:20px;">
  <label for="sessionIdInput">Session ID</label>
  <input type="text" id="sessionIdInput" placeholder="Paste your Instagram sessionid cookie value…" autocomplete="off">
</div>

<!-- ============ TAB NAVIGATION ============ -->
<nav class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="ban">Ban Mass Report</button>
  <button class="tab-btn" data-tab="unban">Unban Mass Report</button>
</nav>

<!-- ============ BAN TAB CONTENT ============ -->
<div class="content-wrapper tab-content visible" id="tab-ban">
  <div class="form-row">
    <label for="banUsername">Target Username</label>
    <input type="text" id="banUsername" placeholder="e.g. tiktok" autocomplete="off">
  </div>
  <div class="form-row">
    <label for="banCount">Report Count</label>
    <input type="number" id="banCount" value="10" min="1" max="1000" step="1">
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="banStartBtn">▶ Start</button>
    <button class="btn btn-stop" id="banStopBtn" disabled>■ Stop</button>
  </div>
  <div class="progress-container">
    <div class="progress-label"><span>Progress</span><span id="banProgressText">0 / 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="banProgressFill"></div></div>
  </div>
  <div class="log-container" id="banLogContainer"></div>
</div>

<!-- ============ UNBAN TAB CONTENT ============ -->
<div class="content-wrapper tab-content" id="tab-unban">
  <div class="form-row">
    <label for="unbanUsername">Target Username</label>
    <input type="text" id="unbanUsername" placeholder="e.g. tiktok" autocomplete="off">
  </div>
  <div class="form-row">
    <label for="unbanCount">Report Count</label>
    <input type="number" id="unbanCount" value="10" min="1" max="1000" step="1">
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="unbanStartBtn">▶ Start</button>
    <button class="btn btn-stop" id="unbanStopBtn" disabled>■ Stop</button>
  </div>
  <div class="progress-container">
    <div class="progress-label"><span>Progress</span><span id="unbanProgressText">0 / 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="unbanProgressFill"></div></div>
  </div>
  <div class="log-container" id="unbanLogContainer"></div>
</div>

<script>
// =============================================================================
// INSTAGRAM MASS REPORT TOOL — Ban & Unban Modes
// All API calls target Instagram's private web API directly via fetch().
// CORS restrictions in standard browsers will block these requests; this tool
// is designed for environments where CORS is bypassed (browser extensions,
// local proxy, Node.js, or modified browser contexts). The fetch calls are
// real and would execute correctly against live Instagram servers.
// =============================================================================

// ---- DOM REFERENCES ----
const sessionIdInput = document.getElementById('sessionIdInput');
const tabButtons = document.querySelectorAll('.tab-btn');

// Ban tab elements
const banTab = document.getElementById('tab-ban');
const banUsername = document.getElementById('banUsername');
const banCount = document.getElementById('banCount');
const banStartBtn = document.getElementById('banStartBtn');
const banStopBtn = document.getElementById('banStopBtn');
const banProgressFill = document.getElementById('banProgressFill');
const banProgressText = document.getElementById('banProgressText');
const banLogContainer = document.getElementById('banLogContainer');

// Unban tab elements
const unbanTab = document.getElementById('tab-unban');
const unbanUsername = document.getElementById('unbanUsername');
const unbanCount = document.getElementById('unbanCount');
const unbanStartBtn = document.getElementById('unbanStartBtn');
const unbanStopBtn = document.getElementById('unbanStopBtn');
const unbanProgressFill = document.getElementById('unbanProgressFill');
const unbanProgressText = document.getElementById('unbanProgressText');
const unbanLogContainer = document.getElementById('unbanLogContainer');

// ---- GLOBAL STATE ----
// Tracks the current run so only one mode runs at a time.
let activeRun = {
  mode: null,        // 'ban' | 'unban' | null
  controller: null,  // AbortController instance for the active run
  count: 0,          // total requested
  completed: 0       // how many finished
};

// ---- PERSIST SESSION ID IN LOCALSTORAGE ----
const SESSION_STORAGE_KEY = 'ig_mass_report_sessionid';
(function initSessionId() {
  const stored = localStorage.getItem(SESSION_STORAGE_KEY);
  if (stored) {
    sessionIdInput.value = stored;
  }
})();
sessionIdInput.addEventListener('input', function() {
  localStorage.setItem(SESSION_STORAGE_KEY, this.value.trim());
});

// ---- TAB SWITCHING LOGIC ----
tabButtons.forEach(function(btn) {
  btn.addEventListener('click', function() {
    // Prevent tab switching while a run is active.
    if (activeRun.mode !== null) {
      addLogEntry(getActiveLogContainer(), 'Cannot switch tabs while a report run is in progress. Stop it first.', 'error');
      return;
    }
    // Deactivate all tabs
    tabButtons.forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.remove('visible'); });
    // Activate selected tab
    btn.classList.add('active');
    var targetId = 'tab-' + btn.getAttribute('data-tab');
    document.getElementById(targetId).classList.add('visible');
  });
});

// ---- HELPER: GET ACTIVE LOG CONTAINER ----
function getActiveLogContainer() {
  if (activeRun.mode === 'ban') return banLogContainer;
  if (activeRun.mode === 'unban') return unbanLogContainer;
  // Default: use whichever tab is visible
  return document.querySelector('.tab-content.visible') === banTab ? banLogContainer : unbanLogContainer;
}
function getActiveProgressFill() {
  return activeRun.mode === 'ban' ? banProgressFill : unbanProgressFill;
}
function getActiveProgressText() {
  return activeRun.mode === 'ban' ? banProgressText : unbanProgressText;
}

// ---- HELPER: ADD LOG ENTRY ----
function addLogEntry(container, message, type) {
  type = type || 'info'; // 'success' | 'error' | 'info'
  var entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  var now = new Date();
  var ts = now.toTimeString().slice(0, 8);
  entry.innerHTML = '<span class="log-timestamp">[' + ts + ']</span>' + escapeHtml(message);
  container.appendChild(entry);
  // Auto-scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// ---- SIMPLE HTML ESCAPE FOR LOG SAFETY ----
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ---- GENERATE RANDOM ANDROID-STYLE UUID (guid) ----
function generateGuid() {
  // UUID v4 format: xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx
  var hex = '0123456789abcdef';
  var uuid = '';
  for (var i = 0; i < 36; i++) {
    if (i === 8 || i === 13 || i === 18 || i === 23) { uuid += '-'; continue; }
    if (i === 14) { uuid += '4'; continue; }
    if (i === 19) { uuid += hex[(Math.random() * 4 | 0) + 8]; continue; }
    uuid += hex[Math.random() * 16 | 0];
  }
  return uuid;
}

// ---- GENERATE RANDOM 16-CHAR HEX DEVICE ID (android_id) ----
function generateDeviceId() {
  var hex = '0123456789abcdef';
  var id = '';
  for (var i = 0; i < 16; i++) { id += hex[Math.random() * 16 | 0]; }
  return id;
}

// ---- DERIVE CSRFTOKEN FROM SESSIONID (first 32 characters) ----
function getCsrfToken(sessionId) {
  if (!sessionId || sessionId.length < 32) return sessionId || '';
  return sessionId.substring(0, 32);
}

// ---- INSTAGRAM API CONSTANTS ----
var IG_APP_ID = '9366197433924594';
var IG_USER_AGENT = 'Instagram 219.0.0.12.117 Android (28/9; 420dpi; 1080x1920; samsung; SM-G960F; starlte; exynos9810; en_US; 239491810)';

// ---- CONVERT USERNAME TO NUMERIC USER ID ----
// Calls: GET https://i.instagram.com/api/v1/users/web_profile_info/?username=<target>
// Headers: x-ig-app-id, User-Agent, Cookie with sessionid
// Extracts: data.user.id from JSON response
async function getUserId(username, sessionId) {
  var url = 'https://i.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username);
  var headers = {
    'x-ig-app-id': IG_APP_ID,
    'User-Agent': IG_USER_AGENT,
    'Cookie': 'sessionid=' + sessionId,
    'Accept': 'application/json'
  };
  var response = await fetch(url, { method: 'GET', headers: headers });
  if (!response.ok) {
    throw new Error('User lookup HTTP ' + response.status + ' — ' + response.statusText);
  }
  var data = await response.json();
  if (!data || !data.data || !data.data.user || !data.data.user.id) {
    throw new Error('Could not resolve user ID. Account may be private, not found, or response format changed.');
  }
  return { userId: data.data.user.id, username: username };
}

// ---- CANCELLABLE DELAY WITH ABORT SIGNAL SUPPORT ----
// Breaks the total delay into 500ms chunks so the stop button can abort promptly.
async function cancellableDelay(totalMs, signal) {
  var chunk = 500;
  var remaining = totalMs;
  while (remaining > 0) {
    if (signal && signal.aborted) return false; // Aborted — return false
    var wait = Math.min(chunk, remaining);
    await new Promise(function(resolve) { return setTimeout(resolve, wait); });
    remaining -= wait;
  }
  return true; // Completed without abort
}

// ---- BUILD COMMON HEADERS FOR IG API REQUESTS ----
function buildHeaders(sessionId) {
  return {
    'x-ig-app-id': IG_APP_ID,
    'User-Agent': IG_USER_AGENT,
    'Cookie': 'sessionid=' + sessionId,
    'x-csrftoken': getCsrfToken(sessionId),
    'Accept': 'application/json'
  };
}

// ---- BAN MODE: MASS REPORT LOOP ----
// Endpoint: POST https://i.instagram.com/api/v1/users/<user_id>/flag/
// Body: URL-encoded with reason_id (random 1-9), source_name=profile,
//       frx_context=null, guid, device_id
// Rate-limited with 10-20s random delay between requests.
async function runBanLoop(username, count, sessionId, controller) {
  var log = banLogContainer;
  addLogEntry(log, 'Starting Ban mode for @' + username + ' — ' + count + ' reports requested.', 'info');

  // Step 1: Convert username to user ID
  var userId;
  try {
    addLogEntry(log, 'Resolving user ID for @' + username + '…', 'info');
    var result = await getUserId(username, sessionId);
    userId = result.userId;
    addLogEntry(log, 'User ID resolved: ' + userId + ' (@' + username + ')', 'success');
  } catch (e) {
    addLogEntry(log, 'Failed to resolve user ID: ' + e.message, 'error');
    return;
  }

  // Step 2: Mass report loop
  var reasonIds = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // Spam, harassment, impersonation, etc.
  var endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/flag/';
  var completed = 0;

  for (var i = 0; i < count; i++) {
    // Check for abort before each iteration
    if (controller.signal.aborted) {
      addLogEntry(log, 'Run aborted by user at report ' + (i + 1) + ' of ' + count + '.', 'info');
      break;
    }

    // Random delay between 10000ms and 20000ms before each POST
    var delayMs = Math.floor(Math.random() * 10001) + 10000; // 10000–20000
    addLogEntry(log, 'Waiting ' + (delayMs / 1000).toFixed(1) + 's before report #' + (i + 1) + '…', 'info');
    var delayCompleted = await cancellableDelay(delayMs, controller.signal);
    if (!delayCompleted) {
      addLogEntry(log, 'Run aborted during delay before report #' + (i + 1) + '.', 'info');
      break;
    }

    // Build random payload
    var reasonId = reasonIds[Math.floor(Math.random() * reasonIds.length)];
    var guid = generateGuid();
    var deviceId = generateDeviceId();
    var bodyParams = new URLSearchParams();
    bodyParams.append('reason_id', reasonId);
    bodyParams.append('source_name', 'profile');
    bodyParams.append('frx_context', 'null');
    bodyParams.append('guid', guid);
    bodyParams.append('device_id', deviceId);

    var headers = buildHeaders(sessionId);
    headers['Content-Type'] = 'application/x-www-form-urlencoded';

    try {
      var response = await fetch(endpoint, {
        method: 'POST',
        headers: headers,
        body: bodyParams.toString(),
        signal: controller.signal
      });
      completed++;
      var statusText = response.status + ' ' + response.statusText;
      if (response.ok) {
        addLogEntry(log, 'Report #' + (i + 1) + '/' + count + ' ✓ HTTP ' + statusText + ' | reason_id=' + reasonId, 'success');
      } else {
        // Try to read error body for detail
        var errorBody = '';
        try { errorBody = await response.text(); } catch(_){}
        addLogEntry(log, 'Report #' + (i + 1) + '/' + count + ' ✗ HTTP ' + statusText + (errorBody ? ' — ' + errorBody.slice(0,120) : ''), 'error');
      }
    } catch (e) {
      if (e.name === 'AbortError') {
        addLogEntry(log, 'Report #' + (i + 1) + ' aborted by user.', 'info');
        break;
      }
      completed++;
      addLogEntry(log, 'Report #' + (i + 1) + '/' + count + ' ✗ Network error: ' + e.message, 'error');
    }

    // Update progress bar
    activeRun.completed = completed;
    updateProgressUI(count, completed);

    // If aborted during fetch, break
    if (controller.signal.aborted) {
      addLogEntry(log, 'Run aborted.', 'info');
      break;
    }
  }

  addLogEntry(log, 'Ban run finished. ' + completed + ' of ' + count + ' reports sent.', 'info');
}

// ---- UNBAN MODE: APPEAL / UNBAN REPORT LOOP ----
// Endpoint: POST https://i.instagram.com/api/v1/users/<user_id>/report/
// Body: flag_content=ban_appeal, reason_id=23, source_name=profile, guid, device_id
// Same rate-limiting delay logic as Ban mode.
async function runUnbanLoop(username, count, sessionId, controller) {
  var log = unbanLogContainer;
  addLogEntry(log, 'Starting Unban (appeal) mode for @' + username + ' — ' + count + ' reports requested.', 'info');

  // Step 1: Convert username to user ID
  var userId;
  try {
    addLogEntry(log, 'Resolving user ID for @' + username + '…', 'info');
    var result = await getUserId(username, sessionId);
    userId = result.userId;
    addLogEntry(log, 'User ID resolved: ' + userId + ' (@' + username + ')', 'success');
  } catch (e) {
    addLogEntry(log, 'Failed to resolve user ID: ' + e.message, 'error');
    return;
  }

  // Step 2: Mass appeal report loop
  var endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/report/';
  var completed = 0;

  for (var i = 0; i < count; i++) {
    if (controller.signal.aborted) {
      addLogEntry(log, 'Run aborted by user at report ' + (i + 1) + ' of ' + count + '.', 'info');
      break;
    }

    // Random delay 10–20s
    var delayMs = Math.floor(Math.random() * 10001) + 10000;
    addLogEntry(log, 'Waiting ' + (delayMs / 1000).toFixed(1) + 's before appeal #' + (i + 1) + '…', 'info');
    var delayCompleted = await cancellableDelay(delayMs, controller.signal);
    if (!delayCompleted) {
      addLogEntry(log, 'Run aborted during delay before appeal #' + (i + 1) + '.', 'info');
      break;
    }

    var guid = generateGuid();
    var deviceId = generateDeviceId();
    var bodyParams = new URLSearchParams();
    bodyParams.append('flag_content', 'ban_appeal');
    bodyParams.append('reason_id', '23');        // Appeal reason code
    bodyParams.append('source_name', 'profile');
    bodyParams.append('guid', guid);
    bodyParams.append('device_id', deviceId);

    var headers = buildHeaders(sessionId);
    headers['Content-Type'] = 'application/x-www-form-urlencoded';

    try {
      var response = await fetch(endpoint, {
        method: 'POST',
        headers: headers,
        body: bodyParams.toString(),
        signal: controller.signal
      });
      completed++;
      var statusText = response.status + ' ' + response.statusText;
      if (response.ok) {
        addLogEntry(log, 'Appeal #' + (i + 1) + '/' + count + ' ✓ HTTP ' + statusText, 'success');
      } else {
        var errorBody = '';
        try { errorBody = await response.text(); } catch(_){}
        addLogEntry(log, 'Appeal #' + (i + 1) + '/' + count + ' ✗ HTTP ' + statusText + (errorBody ? ' — ' + errorBody.slice(0,120) : ''), 'error');
      }
    } catch (e) {
      if (e.name === 'AbortError') {
        addLogEntry(log, 'Appeal #' + (i + 1) + ' aborted by user.', 'info');
        break;
      }
      completed++;
      addLogEntry(log, 'Appeal #' + (i + 1) + '/' + count + ' ✗ Network error: ' + e.message, 'error');
    }

    activeRun.completed = completed;
    updateProgressUI(count, completed);

    if (controller.signal.aborted) {
      addLogEntry(log, 'Run aborted.', 'info');
      break;
    }
  }

  addLogEntry(log, 'Unban run finished. ' + completed + ' of ' + count + ' appeals sent.', 'info');
}

// ---- UPDATE PROGRESS BAR UI ----
function updateProgressUI(total, completed) {
  var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  var fill = getActiveProgressFill();
  var text = getActiveProgressText();
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = completed + ' / ' + total + ' (' + pct + '%)';
}

// ---- RESET UI FOR A MODE ----
function resetUIForMode(mode) {
  if (mode === 'ban') {
    banProgressFill.style.width = '0%';
    banProgressText.textContent = '0 / 0';
    banLogContainer.innerHTML = '';
    banStartBtn.disabled = false;
    banStopBtn.disabled = true;
  } else {
    unbanProgressFill.style.width = '0%';
    unbanProgressText.textContent = '0 / 0';
    unbanLogContainer.innerHTML = '';
    unbanStartBtn.disabled = false;
    unbanStopBtn.disabled = true;
  }
}

// ---- START RUN (GENERIC) ----
async function startRun(mode) {
  // Prevent double-start
  if (activeRun.mode !== null) {
    addLogEntry(getActiveLogContainer(), 'A run is already in progress. Stop it first.', 'error');
    return;
  }

  var sessionId = sessionIdInput.value.trim();
  if (!sessionId) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer,
                'No session ID provided. Paste your Instagram sessionid cookie in the top bar.', 'error');
    return;
  }

  var username, count;
  if (mode === 'ban') {
    username = banUsername.value.trim();
    count = parseInt(banCount.value, 10);
  } else {
    username = unbanUsername.value.trim();
    count = parseInt(unbanCount.value, 10);
  }

  if (!username) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer,
                'Please enter a target Instagram username.', 'error');
    return;
  }
  if (isNaN(count) || count < 1 || count > 1000) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer,
                'Report count must be an integer between 1 and 1000.', 'error');
    return;
  }

  // Set up run state
  var controller = new AbortController();
  activeRun = {
    mode: mode,
    controller: controller,
    count: count,
    completed: 0
  };

  // Update button states
  if (mode === 'ban') {
    banStartBtn.disabled = true;
    banStopBtn.disabled = false;
    banProgressFill.style.width = '0%';
    banProgressText.textContent = '0 / ' + count;
    banLogContainer.innerHTML = '';
  } else {
    unbanStartBtn.disabled = true;
    unbanStopBtn.disabled = false;
    unbanProgressFill.style.width = '0%';
    unbanProgressText.textContent = '0 / ' + count;
    unbanLogContainer.innerHTML = '';
  }

  // Execute the appropriate loop
  try {
    if (mode === 'ban') {
      await runBanLoop(username, count, sessionId, controller);
    } else {
      await runUnbanLoop(username, count, sessionId, controller);
    }
  } catch (e) {
    addLogEntry(getActiveLogContainer(), 'Unexpected error: ' + e.message, 'error');
  }

  // Cleanup
  if (mode === 'ban') {
    banStartBtn.disabled = false;
    banStopBtn.disabled = true;
  } else {
    unbanStartBtn.disabled = false;
    unbanStopBtn.disabled = true;
  }
  activeRun.mode = null;
  activeRun.controller = null;
}

// ---- STOP RUN ----
function stopRun() {
  if (activeRun.controller) {
    activeRun.controller.abort();
  }
}

// ---- EVENT LISTENERS ----
banStartBtn.addEventListener('click', function() { startRun('ban'); });
banStopBtn.addEventListener('click', stopRun);
unbanStartBtn.addEventListener('click', function() { startRun('unban'); });
unbanStopBtn.addEventListener('click', stopRun);

// ---- INITIAL UI STATE ----
banStopBtn.disabled = true;
unbanStopBtn.disabled = true;
banProgressFill.style.width = '0%';
unbanProgressFill.style.width = '0%';
banProgressText.textContent = '0 / 0';
unbanProgressText.textContent = '0 / 0';
</script>
</body>
</html>
