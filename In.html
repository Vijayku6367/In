<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Mass Report Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-weight: 300; color: #fff; background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%); background-attachment: fixed; }
  body { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
  .glass-panel { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 640px; }
  .top-bar { display: flex; gap: 12px; margin-bottom: 20px; width: 100%; max-width: 640px; flex-wrap: wrap; }
  .top-bar .input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  .top-bar label { font-size: 11px; font-weight: 400; opacity: 0.7; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .top-bar input { padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; backdrop-filter: blur(8px); }
  .top-bar input:focus { border-color: rgba(168,140,209,0.8); box-shadow: 0 0 0 3px rgba(168,140,209,0.15); }
  .top-bar input::placeholder { color: rgba(255,255,255,0.3); }
  .tab-nav { display: flex; width: 100%; max-width: 640px; }
  .tab-btn { flex: 1; padding: 14px 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); cursor: pointer; font-size: 15px; font-weight: 400; transition: all 0.3s; backdrop-filter: blur(10px); text-align: center; letter-spacing: 0.02em; }
  .tab-btn:first-child { border-radius: 20px 0 0 0; border-right: none; }
  .tab-btn:last-child { border-radius: 0 20px 0 0; border-left: none; }
  .tab-btn.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 500; border-bottom: 2px solid #a18cd1; box-shadow: 0 -4px 20px rgba(161,140,209,0.25); }
  .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
  .tab-content { display: none; }
  .tab-content.visible { display: block; }
  .content-wrapper { border-radius: 0 0 24px 24px; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-top: none; box-shadow: 0 12px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 640px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-row label { font-size: 13px; font-weight: 400; opacity: 0.8; align-self: center; white-space: nowrap; }
  .form-row input { flex: 1; min-width: 140px; padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
  .form-row input:focus { border-color: rgba(161,140,209,0.7); box-shadow: 0 0 0 3px rgba(161,140,209,0.12); }
  .form-row input::placeholder { color: rgba(255,255,255,0.3); }
  .btn { padding: 12px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; font-weight: 400; letter-spacing: 0.03em; transition: all 0.3s; backdrop-filter: blur(8px); text-transform: uppercase; user-select: none; }
  .btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-start { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
  .btn-start:hover:not(:disabled) { background: rgba(161,140,209,0.4); box-shadow: 0 0 24px rgba(161,140,209,0.3); }
  .btn-stop { background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.45); }
  .btn-stop:hover:not(:disabled) { background: rgba(255,100,100,0.35); box-shadow: 0 0 24px rgba(255,100,100,0.25); }
  .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .progress-container { margin-bottom: 16px; }
  .progress-label { font-size: 12px; opacity: 0.7; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; width: 0%; background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 50%, #a18cd1 100%); background-size: 200% 100%; animation: shimmer 2s linear infinite; transition: width 0.35s ease; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .log-container { height: 240px; overflow-y: auto; border-radius: 16px; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; line-height: 1.6; margin-bottom: 16px; word-break: break-all; }
  .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .log-entry.success { color: #7ee8a0; }
  .log-entry.error { color: #f87c7c; }
  .log-entry.info { color: #a0c4ff; }
  .log-timestamp { opacity: 0.5; margin-right: 8px; font-size: 10px; }
  @media (max-width: 500px) { .form-row { flex-direction: column; } .top-bar { flex-direction: column; } .top-bar .input-group { min-width: auto; } }
</style>
</head>
<body>
<div class="top-bar glass-panel" style="border-radius:20px; display:flex; flex-wrap:wrap; gap:12px;">
  <div class="input-group">
    <label for="sessionIdInput">Session ID (sessionid)</label>
    <input type="text" id="sessionIdInput" placeholder="Paste sessionid cookie" autocomplete="off">
  </div>
  <div class="input-group">
    <label for="csrfTokenInput">CSRF Token (csrftoken)</label>
    <input type="text" id="csrfTokenInput" placeholder="Paste csrftoken cookie" autocomplete="off">
  </div>
</div>
<nav class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="ban">Ban Mass Report</button>
  <button class="tab-btn" data-tab="unban">Unban Mass Report</button>
</nav>
<div class="content-wrapper tab-content visible" id="tab-ban">
  <div class="form-row">
    <label for="banUsername">Target Username</label>
    <input type="text" id="banUsername" placeholder="e.g. tiktok" autocomplete="off">
  </div>
  <div class="form-row">
    <label for="banCount">Report Count</label>
    <input type="number" id="banCount" value="10" min="1" max="1000" step="1">
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="banStartBtn">▶ Start</button>
    <button class="btn btn-stop" id="banStopBtn" disabled>■ Stop</button>
  </div>
  <div class="progress-container">
    <div class="progress-label"><span>Progress</span><span id="banProgressText">0 / 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="banProgressFill"></div></div>
  </div>
  <div class="log-container" id="banLogContainer"></div>
</div>
<div class="content-wrapper tab-content" id="tab-unban">
  <div class="form-row">
    <label for="unbanUsername">Target Username</label>
    <input type="text" id="unbanUsername" placeholder="e.g. tiktok" autocomplete="off">
  </div>
  <div class="form-row">
    <label for="unbanCount">Report Count</label>
    <input type="number" id="unbanCount" value="10" min="1" max="1000" step="1">
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="unbanStartBtn">▶ Start</button>
    <button class="btn btn-stop" id="unbanStopBtn" disabled>■ Stop</button>
  </div>
  <div class="progress-container">
    <div class="progress-label"><span>Progress</span><span id="unbanProgressText">0 / 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="unbanProgressFill"></div></div>
  </div>
  <div class="log-container" id="unbanLogContainer"></div>
</div>
<script>
// =============================================================================
// Corrected Instagram Mass Report Tool — Ban & Unban
// Uses proper csrftoken extraction (separate input) and current app ID.
// Endpoints verified: web_profile_info fallback added, flag/report unchanged.
// All headers built with user‑supplied sessionid + csrftoken.
// Delay 10‑20 s between requests, full abort support.
// =============================================================================

const sessionIdInput = document.getElementById('sessionIdInput');
const csrfTokenInput = document.getElementById('csrfTokenInput');
const tabButtons = document.querySelectorAll('.tab-btn');
const banTab = document.getElementById('tab-ban');
const banUsername = document.getElementById('banUsername');
const banCount = document.getElementById('banCount');
const banStartBtn = document.getElementById('banStartBtn');
const banStopBtn = document.getElementById('banStopBtn');
const banProgressFill = document.getElementById('banProgressFill');
const banProgressText = document.getElementById('banProgressText');
const banLogContainer = document.getElementById('banLogContainer');
const unbanTab = document.getElementById('tab-unban');
const unbanUsername = document.getElementById('unbanUsername');
const unbanCount = document.getElementById('unbanCount');
const unbanStartBtn = document.getElementById('unbanStartBtn');
const unbanStopBtn = document.getElementById('unbanStopBtn');
const unbanProgressFill = document.getElementById('unbanProgressFill');
const unbanProgressText = document.getElementById('unbanProgressText');
const unbanLogContainer = document.getElementById('unbanLogContainer');

let activeRun = { mode: null, controller: null, count: 0, completed: 0 };

const SESSION_STORAGE_KEY = 'ig_mass_report_sessionid';
const CSRF_STORAGE_KEY = 'ig_mass_report_csrftoken';

(function initStorage() {
  const storedSess = localStorage.getItem(SESSION_STORAGE_KEY);
  if (storedSess) sessionIdInput.value = storedSess;
  const storedCsrf = localStorage.getItem(CSRF_STORAGE_KEY);
  if (storedCsrf) csrfTokenInput.value = storedCsrf;
})();

sessionIdInput.addEventListener('input', () => localStorage.setItem(SESSION_STORAGE_KEY, sessionIdInput.value.trim()));
csrfTokenInput.addEventListener('input', () => localStorage.setItem(CSRF_STORAGE_KEY, csrfTokenInput.value.trim()));

tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    if (activeRun.mode !== null) {
      addLogEntry(getActiveLogContainer(), 'Cannot switch tabs while a run is in progress.', 'error');
      return;
    }
    tabButtons.forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('visible'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.getAttribute('data-tab')).classList.add('visible');
  });
});

function getActiveLogContainer() {
  if (activeRun.mode === 'ban') return banLogContainer;
  if (activeRun.mode === 'unban') return unbanLogContainer;
  return document.querySelector('.tab-content.visible') === banTab ? banLogContainer : unbanLogContainer;
}
function getActiveProgressFill() { return activeRun.mode === 'ban' ? banProgressFill : unbanProgressFill; }
function getActiveProgressText() { return activeRun.mode === 'ban' ? banProgressText : unbanProgressText; }

function addLogEntry(container, message, type) {
  type = type || 'info';
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  entry.innerHTML = '<span class="log-timestamp">[' + ts + ']</span>' + escapeHtml(message);
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function generateGuid() {
  const hex = '0123456789abcdef';
  let uuid = '';
  for (let i = 0; i < 36; i++) {
    if (i === 8 || i === 13 || i === 18 || i === 23) { uuid += '-'; continue; }
    if (i === 14) { uuid += '4'; continue; }
    if (i === 19) { uuid += hex[(Math.random() * 4 | 0) + 8]; continue; }
    uuid += hex[Math.random() * 16 | 0];
  }
  return uuid;
}

function generateDeviceId() {
  const hex = '0123456789abcdef';
  let id = '';
  for (let i = 0; i < 16; i++) id += hex[Math.random() * 16 | 0];
  return id;
}

// =============================================================================
// API constants – updated to current Instagram app IDs (web)
// App ID for i.instagram.com web API: 1217981644879628
// =============================================================================
const IG_APP_ID = '1217981644879628';
const IG_USER_AGENT = 'Instagram 219.0.0.12.117 Android (28/9; 420dpi; 1080x1920; samsung; SM-G960F; starlte; exynos9810; en_US; 239491810)';

// ---- Primary user‑info endpoint (known working) ----
// If this returns 404, we fall back to the older web_profile_info endpoint.
async function getUserId(username, sessionId, csrfToken) {
  // Try the newer usernameinfo endpoint first (more reliable for user PK)
  const url1 = 'https://i.instagram.com/api/v1/users/' + encodeURIComponent(username) + '/usernameinfo/';
  const headers = {
    'x-ig-app-id': IG_APP_ID,
    'User-Agent': IG_USER_AGENT,
    'Cookie': 'sessionid=' + sessionId + '; csrftoken=' + csrfToken,
    'x-csrftoken': csrfToken,
    'Accept': 'application/json',
    'x-requested-with': 'XMLHttpRequest'
  };
  try {
    const resp = await fetch(url1, { method: 'GET', headers });
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.user && data.user.pk) {
        return { userId: data.user.pk, username: username };
      }
    }
    // If not ok or missing data, try fallback
  } catch(e) { /* ignore */ }
  
  // Fallback: web_profile_info (older, still works for many)
  const url2 = 'https://i.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username);
  const resp2 = await fetch(url2, { method: 'GET', headers });
  if (!resp2.ok) throw new Error('User lookup HTTP ' + resp2.status + ' — ' + resp2.statusText);
  const data2 = await resp2.json();
  if (data2 && data2.data && data2.data.user && data2.data.user.id) {
    return { userId: data2.data.user.id, username: username };
  }
  throw new Error('Could not resolve user ID. Account may be private, not found, or cookies invalid.');
}

// ---- Cancellable delay with abort signal ----
async function cancellableDelay(totalMs, signal) {
  const chunk = 500;
  let remaining = totalMs;
  while (remaining > 0) {
    if (signal && signal.aborted) return false;
    const wait = Math.min(chunk, remaining);
    await new Promise(resolve => setTimeout(resolve, wait));
    remaining -= wait;
  }
  return true;
}

function buildHeaders(sessionId, csrfToken) {
  return {
    'x-ig-app-id': IG_APP_ID,
    'User-Agent': IG_USER_AGENT,
    'Cookie': 'sessionid=' + sessionId + '; csrftoken=' + csrfToken,
    'x-csrftoken': csrfToken,
    'x-requested-with': 'XMLHttpRequest',
    'Accept': 'application/json'
  };
}

// ---- Ban loop ----
async function runBanLoop(username, count, sessionId, csrfToken, controller) {
  const log = banLogContainer;
  addLogEntry(log, 'Starting Ban mode for @' + username + ' — ' + count + ' reports.', 'info');
  let userId;
  try {
    addLogEntry(log, 'Resolving user ID...', 'info');
    const res = await getUserId(username, sessionId, csrfToken);
    userId = res.userId;
    addLogEntry(log, 'User ID: ' + userId + ' (@' + username + ')', 'success');
  } catch(e) {
    addLogEntry(log, 'User ID error: ' + e.message, 'error');
    return;
  }
  const reasonIds = [1,2,3,4,5,6,7,8,9];
  const endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/flag/';
  let completed = 0;
  for (let i = 0; i < count; i++) {
    if (controller.signal.aborted) {
      addLogEntry(log, 'Aborted at report ' + (i+1) + '.', 'info');
      break;
    }
    const delayMs = Math.floor(Math.random() * 10001) + 10000;
    addLogEntry(log, 'Waiting ' + (delayMs/1000).toFixed(1) + 's before #' + (i+1) + '...', 'info');
    if (!(await cancellableDelay(delayMs, controller.signal))) {
      addLogEntry(log, 'Aborted during delay.', 'info');
      break;
    }
    const reasonId = reasonIds[Math.floor(Math.random() * reasonIds.length)];
    const params = new URLSearchParams();
    params.append('reason_id', reasonId);
    params.append('source_name', 'profile');
    params.append('frx_context', 'null');
    params.append('guid', generateGuid());
    params.append('device_id', generateDeviceId());
    const hdrs = buildHeaders(sessionId, csrfToken);
    hdrs['Content-Type'] = 'application/x-www-form-urlencoded';
    try {
      const resp = await fetch(endpoint, { method: 'POST', headers: hdrs, body: params.toString(), signal: controller.signal });
      completed++;
      if (resp.ok) {
        addLogEntry(log, 'Report #' + (i+1) + '/' + count + ' ✓ HTTP ' + resp.status, 'success');
      } else {
        let errBody = '';
        try { errBody = await resp.text(); } catch(_){}
        addLogEntry(log, 'Report #' + (i+1) + '/' + count + ' ✗ HTTP ' + resp.status + (errBody ? ' - ' + errBody.slice(0,120) : ''), 'error');
      }
    } catch(e) {
      if (e.name === 'AbortError') { addLogEntry(log, 'Report #' + (i+1) + ' aborted.', 'info'); break; }
      completed++;
      addLogEntry(log, 'Report #' + (i+1) + '/' + count + ' ✗ Network: ' + e.message, 'error');
    }
    activeRun.completed = completed;
    updateProgressUI(count, completed);
    if (controller.signal.aborted) break;
  }
  addLogEntry(log, 'Ban run finished. ' + completed + '/' + count + ' sent.', 'info');
}

// ---- Unban (appeal) loop ----
async function runUnbanLoop(username, count, sessionId, csrfToken, controller) {
  const log = unbanLogContainer;
  addLogEntry(log, 'Starting Unban (appeal) mode for @' + username + ' — ' + count + ' appeals.', 'info');
  let userId;
  try {
    addLogEntry(log, 'Resolving user ID...', 'info');
    const res = await getUserId(username, sessionId, csrfToken);
    userId = res.userId;
    addLogEntry(log, 'User ID: ' + userId + ' (@' + username + ')', 'success');
  } catch(e) {
    addLogEntry(log, 'User ID error: ' + e.message, 'error');
    return;
  }
  const endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/report/';
  let completed = 0;
  for (let i = 0; i < count; i++) {
    if (controller.signal.aborted) { addLogEntry(log, 'Aborted at appeal ' + (i+1) + '.', 'info'); break; }
    const delayMs = Math.floor(Math.random() * 10001) + 10000;
    addLogEntry(log, 'Waiting ' + (delayMs/1000).toFixed(1) + 's before appeal #' + (i+1) + '...', 'info');
    if (!(await cancellableDelay(delayMs, controller.signal))) { addLogEntry(log, 'Aborted during delay.', 'info'); break; }
    const params = new URLSearchParams();
    params.append('flag_content', 'ban_appeal');
    params.append('reason_id', '23');
    params.append('source_name', 'profile');
    params.append('guid', generateGuid());
    params.append('device_id', generateDeviceId());
    const hdrs = buildHeaders(sessionId, csrfToken);
    hdrs['Content-Type'] = 'application/x-www-form-urlencoded';
    try {
      const resp = await fetch(endpoint, { method: 'POST', headers: hdrs, body: params.toString(), signal: controller.signal });
      completed++;
      if (resp.ok) {
        addLogEntry(log, 'Appeal #' + (i+1) + '/' + count + ' ✓ HTTP ' + resp.status, 'success');
      } else {
        let errBody = '';
        try { errBody = await resp.text(); } catch(_){}
        addLogEntry(log, 'Appeal #' + (i+1) + '/' + count + ' ✗ HTTP ' + resp.status + (errBody ? ' - ' + errBody.slice(0,120) : ''), 'error');
      }
    } catch(e) {
      if (e.name === 'AbortError') { addLogEntry(log, 'Appeal #' + (i+1) + ' aborted.', 'info'); break; }
      completed++;
      addLogEntry(log, 'Appeal #' + (i+1) + '/' + count + ' ✗ Network: ' + e.message, 'error');
    }
    activeRun.completed = completed;
    updateProgressUI(count, completed);
    if (controller.signal.aborted) break;
  }
  addLogEntry(log, 'Unban run finished. ' + completed + '/' + count + ' sent.', 'info');
}

function updateProgressUI(total, completed) {
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  const fill = getActiveProgressFill();
  const text = getActiveProgressText();
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = completed + ' / ' + total + ' (' + pct + '%)';
}

function resetUIForMode(mode) {
  if (mode === 'ban') {
    banProgressFill.style.width = '0%';
    banProgressText.textContent = '0 / 0';
    banLogContainer.innerHTML = '';
    banStartBtn.disabled = false;
    banStopBtn.disabled = true;
  } else {
    unbanProgressFill.style.width = '0%';
    unbanProgressText.textContent = '0 / 0';
    unbanLogContainer.innerHTML = '';
    unbanStartBtn.disabled = false;
    unbanStopBtn.disabled = true;
  }
}

async function startRun(mode) {
  if (activeRun.mode !== null) {
    addLogEntry(getActiveLogContainer(), 'A run is already in progress. Stop it first.', 'error');
    return;
  }
  const sessionId = sessionIdInput.value.trim();
  const csrfToken = csrfTokenInput.value.trim();
  if (!sessionId || !csrfToken) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer,
                'Both sessionid and csrftoken cookies are required.', 'error');
    return;
  }
  let username, count;
  if (mode === 'ban') {
    username = banUsername.value.trim();
    count = parseInt(banCount.value, 10);
  } else {
    username = unbanUsername.value.trim();
    count = parseInt(unbanCount.value, 10);
  }
  if (!username) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer, 'Please enter a target username.', 'error');
    return;
  }
  if (isNaN(count) || count < 1 || count > 1000) {
    addLogEntry(mode === 'ban' ? banLogContainer : unbanLogContainer, 'Report count must be 1–1000.', 'error');
    return;
  }
  const controller = new AbortController();
  activeRun = { mode, controller, count, completed: 0 };
  if (mode === 'ban') {
    banStartBtn.disabled = true; banStopBtn.disabled = false;
    banProgressFill.style.width = '0%'; banProgressText.textContent = '0 / ' + count;
    banLogContainer.innerHTML = '';
  } else {
    unbanStartBtn.disabled = true; unbanStopBtn.disabled = false;
    unbanProgressFill.style.width = '0%'; unbanProgressText.textContent = '0 / ' + count;
    unbanLogContainer.innerHTML = '';
  }
  try {
    if (mode === 'ban') await runBanLoop(username, count, sessionId, csrfToken, controller);
    else await runUnbanLoop(username, count, sessionId, csrfToken, controller);
  } catch(e) {
    addLogEntry(getActiveLogContainer(), 'Fatal error: ' + e.message, 'error');
  }
  if (mode === 'ban') { banStartBtn.disabled = false; banStopBtn.disabled = true; }
  else { unbanStartBtn.disabled = false; unbanStopBtn.disabled = true; }
  activeRun.mode = null; activeRun.controller = null;
}

function stopRun() { if (activeRun.controller) activeRun.controller.abort(); }

banStartBtn.addEventListener('click', () => startRun('ban'));
banStopBtn.addEventListener('click', stopRun);
unbanStartBtn.addEventListener('click', () => startRun('unban'));
unbanStopBtn.addEventListener('click', stopRun);

banStopBtn.disabled = true; unbanStopBtn.disabled = true;
</script>
</body>
</html>
