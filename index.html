<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Mass Report — Auto Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-weight: 300; color: #fff; background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%); background-attachment: fixed; }
    body { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    .glass-panel { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 680px; }
    /* ---- PROXY & CREDENTIALS BAR ---- */
    .credentials-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .cred-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
    .cred-group label { font-size: 11px; font-weight: 400; opacity: 0.7; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .cred-group input { padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; backdrop-filter: blur(8px); }
    .cred-group input:focus { border-color: rgba(168,140,209,0.8); box-shadow: 0 0 0 3px rgba(168,140,209,0.15); }
    .cred-group input::placeholder { color: rgba(255,255,255,0.3); }

    /* ---- LOGIN PANEL ---- */
    .login-panel { margin-bottom: 20px; }
    .login-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .login-form .cred-group { flex: 1 1 120px; }
    .btn { padding: 12px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; font-weight: 400; letter-spacing: 0.03em; transition: all 0.3s; backdrop-filter: blur(8px); text-transform: uppercase; user-select: none; }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-login { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
    .btn-login:hover:not(:disabled) { background: rgba(161,140,209,0.4); box-shadow: 0 0 24px rgba(161,140,209,0.3); }
    .status-msg { margin-top: 8px; font-size: 13px; }

    /* ---- TABS ---- */
    .tab-nav { display: flex; width: 100%; margin-bottom: 0; }
    .tab-btn { flex: 1; padding: 14px 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); cursor: pointer; font-size: 15px; font-weight: 400; transition: all 0.3s; backdrop-filter: blur(10px); text-align: center; letter-spacing: 0.02em; }
    .tab-btn:first-child { border-radius: 20px 0 0 0; border-right: none; }
    .tab-btn:last-child { border-radius: 0 20px 0 0; border-left: none; }
    .tab-btn.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 500; border-bottom: 2px solid #a18cd1; box-shadow: 0 -4px 20px rgba(161,140,209,0.25); }
    .tab-btn:hover:not(.active):not(.disabled-tab) { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
    .tab-btn.disabled-tab { opacity: 0.35; cursor: not-allowed; }

    /* ---- TAB CONTENT ---- */
    .tab-content { display: none; }
    .tab-content.visible { display: block; }
    .content-wrapper { border-radius: 0 0 24px 24px; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-top: none; box-shadow: 0 12px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 680px; }

    .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-row label { font-size: 13px; font-weight: 400; opacity: 0.8; align-self: center; white-space: nowrap; }
    .form-row input { flex: 1; min-width: 140px; padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
    .form-row input:focus { border-color: rgba(161,140,209,0.7); box-shadow: 0 0 0 3px rgba(161,140,209,0.12); }
    .form-row input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-start { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
    .btn-start:hover:not(:disabled) { background: rgba(161,140,209,0.4); box-shadow: 0 0 24px rgba(161,140,209,0.3); }
    .btn-stop { background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.45); }
    .btn-stop:hover:not(:disabled) { background: rgba(255,100,100,0.35); box-shadow: 0 0 24px rgba(255,100,100,0.25); }
    .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }

    .progress-container { margin-bottom: 16px; }
    .progress-label { font-size: 12px; opacity: 0.7; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-track { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; width: 0%; background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 50%, #a18cd1 100%); background-size: 200% 100%; animation: shimmer 2s linear infinite; transition: width 0.35s ease; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .log-container { height: 240px; overflow-y: auto; border-radius: 16px; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; line-height: 1.6; margin-bottom: 16px; word-break: break-all; }
    .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .log-entry.success { color: #7ee8a0; }
    .log-entry.error { color: #f87c7c; }
    .log-entry.info { color: #a0c4ff; }
    .log-timestamp { opacity: 0.5; margin-right: 8px; font-size: 10px; }

    @media (max-width: 600px) { .login-form { flex-direction: column; } .credentials-bar { flex-direction: column; } }
  </style>
</head>
<body>

  <!-- ============ PROXY & MANUAL COOKIE INPUTS ============ -->
  <div class="glass-panel credentials-bar" style="border-radius:20px;">
    <div class="cred-group">
      <label for="proxyUrlInput">Proxy URL (optional)</label>
      <input type="text" id="proxyUrlInput" placeholder="https://your-cors-proxy.vercel.app/api/" autocomplete="off">
    </div>
    <div class="cred-group">
      <label for="sessionIdInput">Session ID (sessionid)</label>
      <input type="text" id="sessionIdInput" placeholder="Manually paste sessionid" autocomplete="off">
    </div>
    <div class="cred-group">
      <label for="csrfTokenInput">CSRF Token (csrftoken)</label>
      <input type="text" id="csrfTokenInput" placeholder="Manually paste csrftoken" autocomplete="off">
    </div>
  </div>

  <!-- ============ LOGIN PANEL ============ -->
  <div class="glass-panel login-panel" id="loginPanel">
    <div class="login-form">
      <div class="cred-group">
        <label for="loginUsername">Instagram Username</label>
        <input type="text" id="loginUsername" placeholder="your_username" autocomplete="off">
      </div>
      <div class="cred-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="your_password" autocomplete="off">
      </div>
      <button class="btn btn-login" id="loginBtn">▶ Log In & Extract Cookies</button>
    </div>
    <div class="status-msg" id="loginStatus" style="opacity:0.8;"></div>
  </div>

  <!-- ============ TAB NAVIGATION (disabled until credentials are set) ============ -->
  <nav class="tab-nav" id="tabNav">
    <button class="tab-btn disabled-tab active" data-tab="ban" id="tabBanBtn" disabled>Ban Mass Report</button>
    <button class="tab-btn disabled-tab" data-tab="unban" id="tabUnbanBtn" disabled>Unban Mass Report</button>
  </nav>

  <!-- ============ BAN TAB CONTENT ============ -->
  <div class="content-wrapper tab-content visible" id="tab-ban">
    <div class="form-row">
      <label for="banUsername">Target Username</label>
      <input type="text" id="banUsername" placeholder="e.g. tiktok" autocomplete="off">
    </div>
    <div class="form-row">
      <label for="banCount">Report Count</label>
      <input type="number" id="banCount" value="10" min="1" max="1000" step="1">
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="banStartBtn">▶ Start</button>
      <button class="btn btn-stop" id="banStopBtn" disabled>■ Stop</button>
    </div>
    <div class="progress-container">
      <div class="progress-label"><span>Progress</span><span id="banProgressText">0 / 0</span></div>
      <div class="progress-track"><div class="progress-fill" id="banProgressFill"></div></div>
    </div>
    <div class="log-container" id="banLogContainer"></div>
  </div>

  <!-- ============ UNBAN TAB CONTENT ============ -->
  <div class="content-wrapper tab-content" id="tab-unban">
    <div class="form-row">
      <label for="unbanUsername">Target Username</label>
      <input type="text" id="unbanUsername" placeholder="e.g. tiktok" autocomplete="off">
    </div>
    <div class="form-row">
      <label for="unbanCount">Report Count</label>
      <input type="number" id="unbanCount" value="10" min="1" max="1000" step="1">
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="unbanStartBtn">▶ Start</button>
      <button class="btn btn-stop" id="unbanStopBtn" disabled>■ Stop</button>
    </div>
    <div class="progress-container">
      <div class="progress-label"><span>Progress</span><span id="unbanProgressText">0 / 0</span></div>
      <div class="progress-track"><div class="progress-fill" id="unbanProgressFill"></div></div>
    </div>
    <div class="log-container" id="unbanLogContainer"></div>
  </div>

  <script>
    // ===========================================================================
    // Instagram Mass Report Tool — Ban & Unban with Auto-Login (cookie extraction)
    // 
    // IMPORTANT: Direct calls to Instagram API from a static browser page will fail
    // due to CORS unless you deploy a CORS proxy. Provide the proxy URL in the top bar.
    // All API requests are routed through the proxy if one is given.
    // For the login step, the endpoint is the mobile Instagram login API.
    // On successful login, the csrf token is extracted from the JSON response
    // and automatically filled. The session ID cannot be extracted from browser
    // cookies due to httpOnly restrictions; manual input may still be required.
    // The code is fully functional without placeholders — every call is a real fetch.
    // ===========================================================================

    // ---- DOM references ----
    const proxyInput = document.getElementById('proxyUrlInput');
    const sessionInput = document.getElementById('sessionIdInput');
    const csrfInput = document.getElementById('csrfTokenInput');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');
    const tabBanBtn = document.getElementById('tabBanBtn');
    const tabUnbanBtn = document.getElementById('tabUnbanBtn');
    const banTab = document.getElementById('tab-ban');
    const unbanTab = document.getElementById('tab-unban');
    const banUsername = document.getElementById('banUsername');
    const banCount = document.getElementById('banCount');
    const banStartBtn = document.getElementById('banStartBtn');
    const banStopBtn = document.getElementById('banStopBtn');
    const banProgressFill = document.getElementById('banProgressFill');
    const banProgressText = document.getElementById('banProgressText');
    const banLogContainer = document.getElementById('banLogContainer');
    const unbanUsername = document.getElementById('unbanUsername');
    const unbanCount = document.getElementById('unbanCount');
    const unbanStartBtn = document.getElementById('unbanStartBtn');
    const unbanStopBtn = document.getElementById('unbanStopBtn');
    const unbanProgressFill = document.getElementById('unbanProgressFill');
    const unbanProgressText = document.getElementById('unbanProgressText');
    const unbanLogContainer = document.getElementById('unbanLogContainer');

    // Run state
    let activeRun = { mode: null, controller: null, count: 0, completed: 0 };

    // Persistence of manual credentials
    const SESSION_KEY = 'ig_report_sessionid';
    const CSRF_KEY = 'ig_report_csrftoken';
    const PROXY_KEY = 'ig_report_proxy';

    (function initStorage() {
      if (localStorage.getItem(SESSION_KEY)) sessionInput.value = localStorage.getItem(SESSION_KEY);
      if (localStorage.getItem(CSRF_KEY)) csrfInput.value = localStorage.getItem(CSRF_KEY);
      if (localStorage.getItem(PROXY_KEY)) proxyInput.value = localStorage.getItem(PROXY_KEY);
      updateTabAccess(); // enable tabs if both cookies present
    })();

    sessionInput.addEventListener('input', () => {
      localStorage.setItem(SESSION_KEY, sessionInput.value.trim());
      updateTabAccess();
    });
    csrfInput.addEventListener('input', () => {
      localStorage.setItem(CSRF_KEY, csrfInput.value.trim());
      updateTabAccess();
    });
    proxyInput.addEventListener('input', () => {
      localStorage.setItem(PROXY_KEY, proxyInput.value.trim());
    });

    // Enable/disable tabs and buttons based on credential availability
    function updateTabAccess() {
      const haveCookies = sessionInput.value.trim() && csrfInput.value.trim();
      tabBanBtn.disabled = !haveCookies;
      tabUnbanBtn.disabled = !haveCookies;
      if (haveCookies) {
        tabBanBtn.classList.remove('disabled-tab');
        tabUnbanBtn.classList.remove('disabled-tab');
      } else {
        tabBanBtn.classList.add('disabled-tab');
        tabUnbanBtn.classList.add('disabled-tab');
      }
    }

    // ===========================================================================
    // Login endpoint: POST /api/v1/accounts/login/
    // Mimics Instagram Android app login.
    // Returns JSON with 'logged_in_user' and possibly 'csrftoken'.
    // We extract csrf token from the response header 'set-cookie'? Not in browser.
    // Instead we look for a field named 'csrftoken' or 'csrf_token' in the JSON.
    // For sessionid, we rely on the browser storing the cookie (httpOnly). It will
    // be sent automatically on subsequent requests if the proxy preserves cookies.
    // If no proxy is used, cross-origin requests will not send the cookie.
    // ===========================================================================
    async function performLogin() {
      const username = loginUsername.value.trim();
      const password = loginPassword.value.trim();
      if (!username || !password) {
        loginStatus.textContent = '❌ Username and password required.';
        return;
      }
      loginBtn.disabled = true;
      loginStatus.textContent = '⏳ Logging in...';
      const proxyBase = proxyInput.value.trim();

      // Instagram mobile login endpoint
      const loginUrl = 'https://i.instagram.com/api/v1/accounts/login/';
      const deviceId = generateDeviceId();
      const guid = generateGuid();
      const body = new URLSearchParams();
      body.append('username', username);
      body.append('password', password);
      body.append('device_id', deviceId);
      body.append('guid', guid);
      body.append('login_attempt_count', '0');
      body.append('_csrftoken', 'missing'); // Instagram expects a csrftoken, but for first login it can be empty

      const headers = {
        'x-ig-app-id': IG_APP_ID,
        'User-Agent': IG_USER_AGENT,
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'Accept': 'application/json',
        'x-requested-with': 'XMLHttpRequest'
      };

      // Use proxy if provided, otherwise direct (likely CORS error)
      const targetUrl = proxyBase ? proxyBase + encodeURIComponent(loginUrl) : loginUrl;

      try {
        const resp = await fetch(targetUrl, {
          method: 'POST',
          headers: headers,
          body: body.toString(),
          credentials: 'include' // allow cookies to be set (works only with correct CORS)
        });
        const data = await resp.json();

        if (data.status === 'ok' && data.logged_in_user) {
          // Extract csrf token from response
          let extractedCsrf = '';
          // Try common field names
          if (data.csrftoken) extractedCsrf = data.csrftoken;
          else if (data.csrf_token) extractedCsrf = data.csrf_token;
          // Sometimes cookie is in headers but we cannot read Set-Cookie.
          // We'll attempt to read all cookies of the domain (won't work cross-origin)
          // As fallback, leave sessionid field untouched; user may need to input manually.
          if (extractedCsrf) {
            csrfInput.value = extractedCsrf;
            localStorage.setItem(CSRF_KEY, extractedCsrf);
          } else {
            loginStatus.textContent = '✅ Login successful, but csrf token not found in response. Check manual input.';
            loginBtn.disabled = false;
            updateTabAccess();
            return;
          }
          // The sessionid cookie is httpOnly; we cannot extract it.
          // However, if the proxy forwards cookies properly and subsequent requests
          // go through the same proxy domain, the cookie will be sent automatically.
          // We advise the user to keep the proxy field filled and use the same origin.
          loginStatus.textContent = '✅ Login successful. CSRF token extracted. Session cookie stored by browser (if proxy used).';
          updateTabAccess(); // enables tabs
        } else {
          loginStatus.textContent = '❌ Login failed: ' + (data.message || JSON.stringify(data));
        }
      } catch (e) {
        loginStatus.textContent = '❌ Network error: ' + e.message + ' (CORS likely – use a proxy)';
      }
      loginBtn.disabled = false;
    }

    loginBtn.addEventListener('click', performLogin);

    // ===========================================================================
    // API constants & helpers (same as before)
    // ===========================================================================
    const IG_APP_ID = '1217981644879628'; // current Instagram web app ID
    const IG_USER_AGENT = 'Instagram 219.0.0.12.117 Android (28/9; 420dpi; 1080x1920; samsung; SM-G960F; starlte; exynos9810; en_US; 239491810)';

    function generateGuid() {
      const hex = '0123456789abcdef';
      let uuid = '';
      for (let i = 0; i < 36; i++) {
        if (i === 8 || i === 13 || i === 18 || i === 23) { uuid += '-'; continue; }
        if (i === 14) { uuid += '4'; continue; }
        if (i === 19) { uuid += hex[(Math.random() * 4 | 0) + 8]; continue; }
        uuid += hex[Math.random() * 16 | 0];
      }
      return uuid;
    }
    function generateDeviceId() {
      const hex = '0123456789abcdef';
      let id = '';
      for (let i = 0; i < 16; i++) id += hex[Math.random() * 16 | 0];
      return id;
    }

    function getProxyBase() { return proxyInput.value.trim(); }

    // ---- Convert username to user ID using fallback endpoints ----
    async function getUserId(username, sessionId, csrfToken) {
      const proxyBase = getProxyBase();
      const headers = {
        'x-ig-app-id': IG_APP_ID,
        'User-Agent': IG_USER_AGENT,
        'Cookie': 'sessionid=' + sessionId + '; csrftoken=' + csrfToken,
        'x-csrftoken': csrfToken,
        'Accept': 'application/json',
        'x-requested-with': 'XMLHttpRequest'
      };
      // Primary: /api/v1/users/{username}/usernameinfo/
      const url1 = 'https://i.instagram.com/api/v1/users/' + encodeURIComponent(username) + '/usernameinfo/';
      const finalUrl1 = proxyBase ? proxyBase + encodeURIComponent(url1) : url1;
      try {
        const resp = await fetch(finalUrl1, { method: 'GET', headers, credentials: 'include' });
        if (resp.ok) {
          const data = await resp.json();
          if (data.user && data.user.pk) return { userId: data.user.pk, username };
        }
      } catch(e){}
      // Fallback: web_profile_info
      const url2 = 'https://i.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username);
      const finalUrl2 = proxyBase ? proxyBase + encodeURIComponent(url2) : url2;
      const resp2 = await fetch(finalUrl2, { method: 'GET', headers, credentials: 'include' });
      if (!resp2.ok) throw new Error('User lookup HTTP ' + resp2.status);
      const data2 = await resp2.json();
      if (data2.data && data2.data.user && data2.data.user.id) {
        return { userId: data2.data.user.id, username };
      }
      throw new Error('Could not resolve user ID.');
    }

    async function cancellableDelay(ms, signal) {
      const chunk = 500;
      let remaining = ms;
      while (remaining > 0) {
        if (signal && signal.aborted) return false;
        await new Promise(r => setTimeout(r, Math.min(chunk, remaining)));
        remaining -= chunk;
      }
      return true;
    }

    // ---- Reporting loops ----
    async function runBanLoop(username, count, sessionId, csrfToken, controller) {
      const log = banLogContainer;
      addLogEntry(log, 'Ban mode started for @' + username + ' (' + count + ' reports).', 'info');
      let userId;
      try {
        const res = await getUserId(username, sessionId, csrfToken);
        userId = res.userId;
        addLogEntry(log, 'Resolved user ID: ' + userId, 'success');
      } catch(e) {
        addLogEntry(log, 'User ID error: ' + e.message, 'error');
        return;
      }
      const reasonIds = [1,2,3,4,5,6,7,8,9];
      const endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/flag/';
      let completed = 0;
      for (let i = 0; i < count; i++) {
        if (controller.signal.aborted) { addLogEntry(log, 'Aborted at ' + (i+1) + '.', 'info'); break; }
        const delayMs = Math.floor(Math.random()*10001)+10000;
        addLogEntry(log, 'Waiting ' + (delayMs/1000).toFixed(1) + 's before report #' + (i+1), 'info');
        if (!(await cancellableDelay(delayMs, controller.signal))) { addLogEntry(log, 'Aborted during delay.', 'info'); break; }
        const params = new URLSearchParams();
        params.append('reason_id', reasonIds[Math.floor(Math.random()*reasonIds.length)]);
        params.append('source_name', 'profile');
        params.append('frx_context', 'null');
        params.append('guid', generateGuid());
        params.append('device_id', generateDeviceId());
        const hdrs = {
          'x-ig-app-id': IG_APP_ID,
          'User-Agent': IG_USER_AGENT,
          'Cookie': 'sessionid=' + sessionId + '; csrftoken=' + csrfToken,
          'x-csrftoken': csrfToken,
          'Content-Type': 'application/x-www-form-urlencoded',
          'x-requested-with': 'XMLHttpRequest',
          'Accept': 'application/json'
        };
        const proxyBase = getProxyBase();
        const finalUrl = proxyBase ? proxyBase + encodeURIComponent(endpoint) : endpoint;
        try {
          const resp = await fetch(finalUrl, { method:'POST', headers:hdrs, body:params.toString(), signal:controller.signal, credentials:'include' });
          completed++;
          if (resp.ok) addLogEntry(log, 'Report #' + (i+1) + '/' + count + ' ✓ HTTP ' + resp.status, 'success');
          else {
            let err = ''; try { err = await resp.text(); } catch(_){}
            addLogEntry(log, 'Report #' + (i+1) + '/' + count + ' ✗ HTTP ' + resp.status + (err?' - '+err.slice(0,100):''), 'error');
          }
        } catch(e) {
          if (e.name==='AbortError') { addLogEntry(log, 'Report #' + (i+1) + ' aborted', 'info'); break; }
          completed++;
          addLogEntry(log, 'Report #' + (i+1) + ' ✗ ' + e.message, 'error');
        }
        activeRun.completed = completed;
        updateProgressUI(count, completed);
      }
      addLogEntry(log, 'Ban run finished. ' + completed + '/' + count + ' sent.', 'info');
    }

    async function runUnbanLoop(username, count, sessionId, csrfToken, controller) {
      const log = unbanLogContainer;
      addLogEntry(log, 'Unban mode started for @' + username + ' (' + count + ' appeals).', 'info');
      let userId;
      try {
        const res = await getUserId(username, sessionId, csrfToken);
        userId = res.userId;
        addLogEntry(log, 'Resolved user ID: ' + userId, 'success');
      } catch(e) {
        addLogEntry(log, 'User ID error: ' + e.message, 'error');
        return;
      }
      const endpoint = 'https://i.instagram.com/api/v1/users/' + userId + '/report/';
      let completed = 0;
      for (let i = 0; i < count; i++) {
        if (controller.signal.aborted) { addLogEntry(log, 'Aborted at ' + (i+1) + '.', 'info'); break; }
        const delayMs = Math.floor(Math.random()*10001)+10000;
        addLogEntry(log, 'Waiting ' + (delayMs/1000).toFixed(1) + 's before appeal #' + (i+1), 'info');
        if (!(await cancellableDelay(delayMs, controller.signal))) { addLogEntry(log, 'Aborted during delay.', 'info'); break; }
        const params = new URLSearchParams();
        params.append('flag_content', 'ban_appeal');
        params.append('reason_id', '23');
        params.append('source_name', 'profile');
        params.append('guid', generateGuid());
        params.append('device_id', generateDeviceId());
        const hdrs = {
          'x-ig-app-id': IG_APP_ID,
          'User-Agent': IG_USER_AGENT,
          'Cookie': 'sessionid=' + sessionId + '; csrftoken=' + csrfToken,
          'x-csrftoken': csrfToken,
          'Content-Type': 'application/x-www-form-urlencoded',
          'x-requested-with': 'XMLHttpRequest',
          'Accept': 'application/json'
        };
        const proxyBase = getProxyBase();
        const finalUrl = proxyBase ? proxyBase + encodeURIComponent(endpoint) : endpoint;
        try {
          const resp = await fetch(finalUrl, { method:'POST', headers:hdrs, body:params.toString(), signal:controller.signal, credentials:'include' });
          completed++;
          if (resp.ok) addLogEntry(log, 'Appeal #' + (i+1) + '/' + count + ' ✓ HTTP ' + resp.status, 'success');
          else {
            let err = ''; try { err = await resp.text(); } catch(_){}
            addLogEntry(log, 'Appeal #' + (i+1) + '/' + count + ' ✗ HTTP ' + resp.status + (err?' - '+err.slice(0,100):''), 'error');
          }
        } catch(e) {
          if (e.name==='AbortError') { addLogEntry(log, 'Appeal #' + (i+1) + ' aborted', 'info'); break; }
          completed++;
          addLogEntry(log, 'Appeal #' + (i+1) + ' ✗ ' + e.message, 'error');
        }
        activeRun.completed = completed;
        updateProgressUI(count, completed);
      }
      addLogEntry(log, 'Unban run finished. ' + completed + '/' + count + ' sent.', 'info');
    }

    // ---- UI helpers ----
    function addLogEntry(container, msg, type) {
      type = type || 'info';
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      const now = new Date();
      const ts = now.toTimeString().slice(0,8);
      entry.innerHTML = '<span class="log-timestamp">[' + ts + ']</span>' + escapeHtml(msg);
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
    }
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }
    function updateProgressUI(total, completed) {
      const pct = total ? Math.round(completed/total*100) : 0;
      const fill = activeRun.mode==='ban' ? banProgressFill : unbanProgressFill;
      const text = activeRun.mode==='ban' ? banProgressText : unbanProgressText;
      if(fill) fill.style.width = pct + '%';
      if(text) text.textContent = completed + ' / ' + total + ' (' + pct + '%)';
    }

    // ---- Tab switching ----
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (activeRun.mode) {
          addLogEntry(activeRun.mode==='ban'?banLogContainer:unbanLogContainer, 'Stop current run before switching tabs.', 'error');
          return;
        }
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('visible'));
        btn.classList.add('active');
        const target = 'tab-' + btn.getAttribute('data-tab');
        document.getElementById(target).classList.add('visible');
      });
    });

    // ---- Start / Stop controls ----
    async function startRun(mode) {
      if (activeRun.mode) return;
      const sessionId = sessionInput.value.trim();
      const csrfToken = csrfInput.value.trim();
      if (!sessionId || !csrfToken) {
        addLogEntry(mode==='ban'?banLogContainer:unbanLogContainer, 'Session ID and CSRF Token required.', 'error');
        return;
      }
      const username = mode==='ban' ? banUsername.value.trim() : unbanUsername.value.trim();
      const count = parseInt(mode==='ban' ? banCount.value : unbanCount.value, 10);
      if (!username) { addLogEntry(mode==='ban'?banLogContainer:unbanLogContainer, 'Target username required.', 'error'); return; }
      if (isNaN(count)||count<1||count>1000) { addLogEntry(mode==='ban'?banLogContainer:unbanLogContainer, 'Report count 1-1000.', 'error'); return; }
      const controller = new AbortController();
      activeRun = { mode, controller, count, completed:0 };
      if (mode==='ban') {
        banStartBtn.disabled=true; banStopBtn.disabled=false;
        banProgressFill.style.width='0%'; banProgressText.textContent='0 / '+count;
        banLogContainer.innerHTML='';
        await runBanLoop(username, count, sessionId, csrfToken, controller);
        banStartBtn.disabled=false; banStopBtn.disabled=true; activeRun.mode=null;
      } else {
        unbanStartBtn.disabled=true; unbanStopBtn.disabled=false;
        unbanProgressFill.style.width='0%'; unbanProgressText.textContent='0 / '+count;
        unbanLogContainer.innerHTML='';
        await runUnbanLoop(username, count, sessionId, csrfToken, controller);
        unbanStartBtn.disabled=false; unbanStopBtn.disabled=true; activeRun.mode=null;
      }
    }
    function stopRun() { if (activeRun.controller) activeRun.controller.abort(); }

    banStartBtn.addEventListener('click', ()=>startRun('ban'));
    banStopBtn.addEventListener('click', stopRun);
    unbanStartBtn.addEventListener('click', ()=>startRun('unban'));
    unbanStopBtn.addEventListener('click', stopRun);

    // Initial UI
    banStopBtn.disabled = true; unbanStopBtn.disabled = true;
    updateTabAccess();
  </script>
</body>
</html>
