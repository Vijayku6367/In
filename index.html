<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulnerability Scanner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  background-image: repeating-radial-gradient(circle at 0 0, rgba(255,255,255,0.015) 0 1px, transparent 1px 40px);
  font-family: system-ui, -apple-system, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 800px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 24px;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 40px rgba(0,0,0,0.8);
}
h1 {
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}
.sub {
  font-size: 0.9rem;
  color: #999;
  margin-bottom: 30px;
}
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
input[type="text"] {
  flex: 1;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 12px;
  color: #fff;
  font-size: 1rem;
  font-family: system-ui, sans-serif;
  outline: none;
  transition: border 0.3s;
}
input[type="text"]:focus {
  border-color: rgba(255, 255, 255, 0.4);
}
button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 12px;
  padding: 12px 30px;
  font-family: system-ui, sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.3s, border 0.3s;
  white-space: nowrap;
}
button:hover {
  background: rgba(255,255,255,0.15);
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
  display: none;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: #fff;
  transition: width 0.1s linear;
}
.status-text {
  font-size: 0.8rem;
  color: #aaa;
  margin-bottom: 10px;
  display: none;
}
.results {
  margin-top: 20px;
}
.card {
  border-left: 4px solid;
  background: rgba(255,255,255,0.02);
  padding: 16px 20px;
  margin-bottom: 12px;
  border-radius: 8px;
  transition: background 0.2s;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}
.card-title {
  font-weight: 600;
}
.severity {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.08);
}
.critical { border-left-color: #fff; }
.high { border-left-color: #ccc; }
.medium { border-left-color: #999; }
.low { border-left-color: #666; }
.details {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: #ccc;
  white-space: pre-wrap;
  word-break: break-all;
  display: none;
}
.card.open .details { display: block; }
.summary {
  margin-top: 40px;
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: none;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  margin: 15px 0;
}
.summary-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
}
canvas { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Vulnerability Scanner</h1>
  <p class="sub">Paste a URL and scan for security weaknesses.</p>
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off" />
    <button id="scanBtn">Scan</button>
    <button id="cancelBtn" disabled>Cancel</button>
  </div>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status-text" id="statusText"></div>
  <div class="results" id="results"></div>
  <div class="summary" id="summary"></div>
</div>
<script>
const state = {
  targetUrl: '',
  domain: '',
  controller: null,
  signal: null,
  scanning: false,
  findings: [],
  progress: 0,
  totalSteps: 14,
  completedSteps: 0
};

const CORS_PROXY = 'https://api.codetabs.com/v1/proxy?quest=';
const SSL_API = 'https://api.hackertarget.com/ssltest/?q=';

const COMMON_PATHS = [
  '/.git/HEAD', '/.env', '/wp-config.php.bak', '/backup.sql',
  '/config.php', '/debug.log', '/phpinfo.php', '/server-status'
];
const COMMON_DIRS = ['/images/', '/css/', '/js/', '/uploads/'];
const REDIRECT_PARAMS = ['redirect','url','next','return','goto','target','r','u'];
const LIB_VULN_MAP = {
  'jquery': [
    { maxVersion: '3.5.0', cve: 'CVE-2020-11022, CVE-2020-11023', severity: 'Medium' }
  ],
  'angular': [
    { maxVersion: '1.8.0', cve: 'CVE-2022-25844, etc.', severity: 'Medium' }
  ],
  'bootstrap': [
    { maxVersion: '4.5.0', cve: 'CVE-2019-8331 (XSS in tooltips)', severity: 'Medium' }
  ],
  'react': [
    { maxVersion: '17.0.0', cve: 'CVE-2021-23364 (prototype pollution)', severity: 'High' }
  ]
};

function parseURL(url) {
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    const u = new URL(url);
    return { full: u.toString(), domain: u.hostname, origin: u.origin };
  } catch { return null; }
}

async function fetchWithProxy(url, options = {}) {
  const response = await fetch(CORS_PROXY + encodeURIComponent(url), options);
  if (!response.ok) throw new Error(`Proxy error: ${response.status}`);
  const data = await response.json();
  return {
    body: data.contents || '',
    headers: data.headers || {},
    status: data.status || 200
  };
}

function extractLinks(html, baseUrl) {
  if (!html) return [];
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const links = [];
  doc.querySelectorAll('a[href]').forEach(a => {
    try {
      const href = new URL(a.getAttribute('href'), baseUrl);
      links.push(href.toString());
    } catch {}
  });
  return [...new Set(links)];
}

function extractScripts(html, baseUrl) {
  if (!html) return [];
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const scripts = [];
  doc.querySelectorAll('script[src]').forEach(s => {
    try {
      const src = new URL(s.getAttribute('src'), baseUrl);
      scripts.push(src.toString());
    } catch {}
  });
  return [...new Set(scripts)];
}

function getQueryParams(url) {
  const u = new URL(url);
  const params = [];
  u.searchParams.forEach((value, key) => params.push({ key, value }));
  return params;
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function addFinding(name, severity, description, details) {
  state.findings.push({ name, severity, description, details });
  renderResults();
}

function renderResults() {
  const container = document.getElementById('results');
  container.innerHTML = state.findings.map((f, i) => `
    <div class="card ${f.severity.toLowerCase()}" id="card-${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <span class="card-title">${f.name}</span>
        <span class="severity">${f.severity}</span>
      </div>
      <div class="details">${escapeHTML(f.description)}\n\n${escapeHTML(f.details)}</div>
    </div>
  `).join('');
}

function toggleCard(idx) {
  document.getElementById(`card-${idx}`).classList.toggle('open');
}

function escapeHTML(text) {
  return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateProgress(increment = 1) {
  state.completedSteps += increment;
  const pct = Math.min(100, (state.completedSteps / state.totalSteps) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statusText').textContent = `Scanning... ${state.completedSteps}/${state.totalSteps} checks completed.`;
}

function showSummary() {
  const summary = document.getElementById('summary');
  if (state.findings.length === 0) {
    summary.innerHTML = '<p>No vulnerabilities found.</p>';
    summary.style.display = 'block';
    return;
  }
  const counts = { Critical: 0, High: 0, Medium: 0, Low: 0 };
  state.findings.forEach(f => counts[f.severity]++);
  const score = counts.Critical * 10 + counts.High * 5 + counts.Medium * 2 + counts.Low * 1;
  summary.innerHTML = `
    <h3>Scan Summary</h3>
    <div class="summary-grid">
      <div class="summary-item"><span>🔴 Critical</span><span>${counts.Critical}</span></div>
      <div class="summary-item"><span>🟠 High</span><span>${counts.High}</span></div>
      <div class="summary-item"><span>🟡 Medium</span><span>${counts.Medium}</span></div>
      <div class="summary-item"><span>⚪ Low</span><span>${counts.Low}</span></div>
    </div>
    <p>Severity Score: <strong>${score}</strong></p>
  `;
  summary.style.display = 'block';
}

async function runChecks() {
  updateProgress(0);
  let initialData;
  try {
    initialData = await fetchWithProxy(state.targetUrl, { signal: state.signal });
  } catch (e) {
    addFinding('Connection Error', 'Critical', 'Failed to fetch target.', e.message);
    return;
  }
  updateProgress(1);
  const headers = initialData.headers;
  const body = initialData.body;
  const baseHref = state.targetUrl;

  checkSecurityHeaders(headers);
  updateProgress(1);
  await checkSSL();
  updateProgress(1);
  checkCookies(headers);
  updateProgress(1);
  await checkOpenRedirect(body, baseHref);
  updateProgress(1);
  await checkXSS(baseHref);
  updateProgress(1);
  await checkCORS();
  updateProgress(1);
  await checkSensitiveFiles();
  updateProgress(1);
  await checkJSLibraries(body, baseHref);
  updateProgress(1);
  checkInfoDisclosure(headers);
  updateProgress(1);
  await checkDirectoryListing();
  updateProgress(1);
  await clickjackingTest();
  updateProgress(1);
  showSummary();
}

function checkSecurityHeaders(headers) {
  const h = headers;
  if (!h['strict-transport-security']) {
    addFinding('Missing Strict-Transport-Security', 'Medium', 'HSTS header not set. Attackers can force HTTP connections.', 'Header not present.');
  }
  const csp = h['content-security-policy'];
  if (!csp) {
    addFinding('Missing Content-Security-Policy', 'High', 'CSP header missing. XSS and data injection risks.', 'Header not present.');
  } else {
    if (csp.includes('unsafe-inline') || csp.includes('unsafe-eval')) {
      addFinding('CSP includes unsafe-inline/unsafe-eval', 'Medium', 'CSP allows inline scripts/eval, weakening protection.', `CSP: ${csp}`);
    }
  }
  const xfo = h['x-frame-options'];
  const frameAncestors = csp ? csp.match(/frame-ancestors[^;]*/) : null;
  if (!xfo && !frameAncestors) {
    addFinding('Clickjacking: Missing X-Frame-Options / frame-ancestors', 'Medium', 'Page can be framed, enabling clickjacking.', 'Neither X-Frame-Options nor frame-ancestors directive found.');
  }
  const xcto = h['x-content-type-options'];
  if (!xcto || xcto.toLowerCase() !== 'nosniff') {
    addFinding('Missing X-Content-Type-Options: nosniff', 'Low', 'MIME sniffing may be exploited.', `Received: ${xcto || 'none'}`);
  }
  if (!h['referrer-policy']) {
    addFinding('Missing Referrer-Policy', 'Low', 'Referrer information may leak.', 'Header not present.');
  }
  if (!h['permissions-policy']) {
    addFinding('Missing Permissions-Policy', 'Low', 'Browser features not restricted.', 'Header not present.');
  }
}

async function checkSSL() {
  try {
    const resp = await fetch(SSL_API + encodeURIComponent(state.domain), { signal: state.signal });
    const text = await resp.text();
    const daysMatch = text.match(/expires in (\d+) days/i);
    const expDateMatch = text.match(/expires:\s*([^\n]+)/i);
    if (daysMatch) {
      const days = parseInt(daysMatch[1]);
      if (days < 30) {
        addFinding('SSL Certificate Expiring Soon', 'High', `Certificate expires in ${days} days.`, text.substring(0, 200));
      }
    } else if (expDateMatch) {
      const expDate = new Date(expDateMatch[1]);
      if (!isNaN(expDate)) {
        const diffDays = Math.ceil((expDate - new Date()) / (1000*3600*24));
        if (diffDays < 30) addFinding('SSL Certificate Expiring Soon', 'High', `Certificate expires in ${diffDays} days.`, text.substring(0, 200));
      }
    }
    if (/SSLv[23]/i.test(text) || /TLS ?1\.0/i.test(text) || /TLS ?1\.1/i.test(text)) {
      addFinding('Weak SSL/TLS Protocols Supported', 'High', 'Legacy protocols (SSLv2/3, TLS 1.0/1.1) enabled. Vulnerable to attacks like POODLE.', text.substring(0, 200));
    }
    if (/RC4|DES|3DES|EXPORT|NULL/i.test(text)) {
      addFinding('Weak Cipher Suites', 'Critical', 'Server supports weak ciphers (RC4, DES, etc.)', text.substring(0, 200));
    }
  } catch (e) {
    addFinding('SSL Check Failed', 'Low', 'Unable to perform SSL/TLS analysis.', e.message);
  }
}

function checkCookies(headers) {
  const setCookie = headers['set-cookie'];
  if (!setCookie) return;
  const cookies = Array.isArray(setCookie) ? setCookie : [setCookie];
  cookies.forEach(cookieStr => {
    const secure = /secure/i.test(cookieStr);
    const httpOnly = /httponly/i.test(cookieStr);
    const sameSite = cookieStr.match(/samesite\s*=\s*(\w+)/i);
    const attrs = [];
    if (!secure) attrs.push('Missing Secure flag');
    if (!httpOnly) attrs.push('Missing HttpOnly flag');
    if (sameSite && !['lax','strict'].includes(sameSite[1].toLowerCase())) {
      attrs.push(`SameSite=${sameSite[1]} (should be Lax or Strict)`);
    } else if (!sameSite) {
      attrs.push('Missing SameSite attribute');
    }
    if (attrs.length > 0) {
      const severity = (!secure || !httpOnly) ? 'High' : 'Medium';
      addFinding('Insecure Cookie', severity, `Cookie: ${cookieStr.split(';')[0]}`, attrs.join('; ') + '\n\nFull: ' + cookieStr);
    }
  });
}

async function checkOpenRedirect(body, baseUrl) {
  if (!body) return;
  const links = extractLinks(body, baseUrl);
  const candidates = [];
  for (const link of links) {
    try {
      const url = new URL(link);
      REDIRECT_PARAMS.forEach(p => {
        if (url.searchParams.has(p)) {
          candidates.push({ link: link, param: p, val: url.searchParams.get(p) });
        }
      });
    } catch {}
  }
  const testTarget = 'https://evil.com';
  for (const c of candidates.slice(0,5)) {
    try {
      const testUrl = new URL(c.link);
      testUrl.searchParams.set(c.param, testTarget);
      const res = await fetchWithProxy(testUrl.toString(), { signal: state.signal });
      if (/http-equiv\s*=\s*["']refresh["']/i.test(res.body) && res.body.includes(testTarget)) {
        addFinding('Open Redirect (meta refresh)', 'Medium', `Potential open redirect via parameter '${c.param}'`, `Test URL: ${testUrl.toString()}\nResponse contains meta refresh to evil.com.`);
        return;
      }
    } catch {}
  }
}

async function checkXSS(baseUrl) {
  const params = getQueryParams(baseUrl);
  if (params.length === 0) return;
  const testPayload = '"><h1>XSS</h1>';
  const limit = Math.min(10, params.length);
  for (let i = 0; i < limit; i++) {
    const p = params[i];
    try {
      const testUrl = new URL(baseUrl);
      testUrl.searchParams.set(p.key, testPayload);
      const res = await fetchWithProxy(testUrl.toString(), { signal: state.signal });
      if (res.body && res.body.includes(testPayload)) {
        addFinding('Reflected XSS', 'Critical', `Parameter '${p.key}' reflects unsanitized input.`, `Payload: "${testPayload}" was found in the response body.`);
        return;
      }
    } catch {}
  }
}

async function checkCORS() {
  try {
    const resp = await fetch(state.targetUrl, { method: 'OPTIONS', mode: 'cors', signal: state.signal });
    const acao = resp.headers.get('Access-Control-Allow-Origin');
    if (acao === '*') {
      addFinding('CORS Misconfiguration: Wildcard Allow-Origin', 'High', 'Access-Control-Allow-Origin is * - allows any origin.', 'Header value: *');
    } else if (acao && acao !== 'null' && acao !== window.location.origin) {
      addFinding('CORS Echoing Request Origin', 'Medium', 'Server mirrors the Origin header, which may be dangerous.', `Allow-Origin: ${acao}`);
    }
  } catch {}
}

async function checkSensitiveFiles() {
  for (const path of COMMON_PATHS) {
    try {
      const url = new URL(path, state.targetUrl).toString();
      const res = await fetchWithProxy(url, { signal: state.signal });
      if (res.status !== 404 && res.body) {
        const containsDbPass = /DB_PASSWORD/i.test(res.body);
        const sensitive = containsDbPass || res.status === 200;
        if (sensitive) {
          addFinding('Exposed Sensitive File', 'Critical', `File found: ${path}`, `Status: ${res.status}\n${containsDbPass ? 'Contains DB_PASSWORD' : 'Accessible'}`);
        }
      }
    } catch {}
  }
}

async function checkJSLibraries(body, baseUrl) {
  if (!body) return;
  const scripts = extractScripts(body, baseUrl);
  for (const script of scripts) {
    const name = script.toLowerCase().includes('jquery') ? 'jquery' : 
                 script.toLowerCase().includes('angular') ? 'angular' :
                 script.toLowerCase().includes('bootstrap') ? 'bootstrap' :
                 script.toLowerCase().includes('react') ? 'react' : null;
    if (!name || !LIB_VULN_MAP[name]) continue;
    try {
      const libResp = await fetchWithProxy(script, { signal: state.signal });
      const content = libResp.body || '';
      const versionMatch = content.match(/(?:v(?:ersion)?\s*)?(\d+\.\d+\.\d+)/i);
      if (versionMatch) {
        const version = versionMatch[1];
        const vulns = LIB_VULN_MAP[name].filter(v => compareVersion(version, v.maxVersion) < 0);
        vulns.forEach(v => {
          addFinding(`Outdated ${name} library`, v.severity, `${name} ${version} < ${v.maxVersion}`, `CVEs: ${v.cve}`);
        });
      }
    } catch {}
  }
}

function compareVersion(v1, v2) {
  const parts1 = v1.split('.').map(Number);
  const parts2 = v2.split('.').map(Number);
  for (let i=0; i<3; i++) {
    const a = parts1[i] || 0, b = parts2[i] || 0;
    if (a > b) return 1;
    if (a < b) return -1;
  }
  return 0;
}

function checkInfoDisclosure(headers) {
  if (headers['server']) {
    const server = headers['server'];
    if (/\d/.test(server)) {
      addFinding('Server Version Disclosure', 'Low', 'Server header reveals version information.', `Server: ${server}`);
    }
  }
  if (headers['x-powered-by']) {
    addFinding('X-Powered-By Header Present', 'Low', 'Discloses technology stack.', `X-Powered-By: ${headers['x-powered-by']}`);
  }
  if (headers['x-aspnet-version']) {
    addFinding('X-AspNet-Version Header', 'Low', 'ASP.NET version disclosed.', `Value: ${headers['x-aspnet-version']}`);
  }
}

async function checkDirectoryListing() {
  for (const dir of COMMON_DIRS) {
    try {
      const url = new URL(dir, state.targetUrl).toString();
      const res = await fetchWithProxy(url, { signal: state.signal });
      if (res.body && (/<title>Index of/i.test(res.body) || (/<a href="[^"]+">/i.test(res.body) && /<h1>Index of/i.test(res.body)))) {
        addFinding('Directory Listing Enabled', 'Medium', `Directory listing exposed for ${dir}`, 'Attacker can browse files.');
        return;
      }
    } catch {}
  }
}

async function clickjackingTest() {
  return new Promise((resolve) => {
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.sandbox = 'allow-same-origin allow-scripts';
    iframe.src = state.targetUrl;
    iframe.onload = () => resolve();
    iframe.onerror = () => resolve();
    document.body.appendChild(iframe);
    setTimeout(() => {
      document.body.removeChild(iframe);
      resolve();
    }, 5000);
  });
}

async function startScan() {
  const input = document.getElementById('urlInput').value.trim();
  if (!input) return;
  const parsed = parseURL(input);
  if (!parsed) {
    addFinding('Invalid URL', 'Critical', 'Could not parse the URL.', input);
    renderResults();
    return;
  }
  state.targetUrl = parsed.full;
  state.domain = parsed.domain;
  state.findings = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  state.completedSteps = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('statusText').style.display = 'block';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('cancelBtn').disabled = false;

  state.controller = new AbortController();
  state.signal = state.controller.signal;
  state.scanning = true;

  try {
    await runChecks();
  } catch (e) {
    if (e.name === 'AbortError') {
      addFinding('Scan Cancelled', 'Low', 'User aborted the scan.', '');
    } else {
      addFinding('Scan Error', 'Critical', 'Unexpected error during scan.', e.message);
    }
  } finally {
    state.scanning = false;
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('cancelBtn').disabled = true;
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('statusText').style.display = 'none';
    showSummary();
  }
}

document.getElementById('scanBtn').addEventListener('click', startScan);
document.getElementById('cancelBtn').addEventListener('click', () => {
  if (state.controller) state.controller.abort();
});
</script>
</body>
</html>
