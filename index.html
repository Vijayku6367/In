<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Mass Report – Auto Login (Fixed)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-weight: 300; color: #fff; background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%); background-attachment: fixed; }
    body { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 680px; margin-bottom: 20px; }
    .cred-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
    .cred-group label { font-size: 11px; font-weight: 400; opacity: 0.7; margin-bottom: 4px; text-transform: uppercase; }
    .cred-group input { padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; }
    .cred-group input:focus { border-color: rgba(168,140,209,0.8); box-shadow: 0 0 0 3px rgba(168,140,209,0.15); }
    .login-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .btn { padding: 12px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-login { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
    .btn-start { background: rgba(161,140,209,0.25); border-color: rgba(161,140,209,0.5); }
    .btn-stop { background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.45); }
    .status-msg { font-size: 13px; margin-top: 8px; opacity: 0.8; }
    .tab-nav { display: flex; }
    .tab-btn { flex: 1; padding: 14px 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); cursor: pointer; font-size: 15px; }
    .tab-btn.active { background: rgba(255,255,255,0.12); color: #fff; border-bottom: 2px solid #a18cd1; }
    .tab-content { display: none; }
    .tab-content.visible { display: block; }
    .content-wrapper { border-radius: 0 0 24px 24px; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-top: none; box-shadow: 0 12px 32px rgba(0,0,0,0.37); padding: 24px; width: 100%; max-width: 680px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-row label { font-size: 13px; opacity: 0.8; align-self: center; }
    .form-row input { flex: 1; padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; }
    .progress-container { margin-bottom: 16px; }
    .progress-track { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; width: 0%; background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 100%); background-size: 200%; animation: shimmer 2s infinite; transition: width 0.35s; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .log { height: 240px; overflow-y: auto; border-radius: 16px; padding: 12px; background: rgba(0,0,0,0.3); font-family: monospace; font-size: 11px; word-break: break-all; }
    .log-entry.success { color: #7ee8a0; } .log-entry.error { color: #f87c7c; } .log-entry.info { color: #a0c4ff; }
  </style>
</head>
<body>
  <!-- Login Panel -->
  <div class="glass">
    <div class="login-form">
      <div class="cred-group"><label>Instagram Username</label><input type="text" id="loginUsername" placeholder="your_username"></div>
      <div class="cred-group"><label>Password</label><input type="password" id="loginPassword" placeholder="your_password"></div>
      <button class="btn btn-login" id="loginBtn">▶ Log In & Extract Cookies</button>
    </div>
    <div class="status-msg" id="loginStatus"></div>
    <div style="display:flex; gap:12px; margin-top:12px">
      <div class="cred-group"><label>Session ID (auto)</label><input type="text" id="sessionIdInput" readonly></div>
      <div class="cred-group"><label>CSRF Token (auto)</label><input type="text" id="csrfTokenInput" readonly></div>
    </div>
  </div>

  <!-- Tabs -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="ban" id="tabBanBtn" disabled>Ban Mass Report</button>
    <button class="tab-btn" data-tab="unban" id="tabUnbanBtn" disabled>Unban Mass Report</button>
  </nav>

  <!-- Ban Tab -->
  <div class="content-wrapper tab-content visible" id="tab-ban">
    <div class="form-row"><label>Target Username</label><input type="text" id="banUsername" placeholder="e.g. tiktok"></div>
    <div class="form-row"><label>Report Count</label><input type="number" id="banCount" value="10" min="1" max="1000"></div>
    <div class="btn-row"><button class="btn btn-start" id="banStartBtn">▶ Start</button><button class="btn btn-stop" id="banStopBtn" disabled>■ Stop</button></div>
    <div class="progress-container"><div class="progress-label"><span>Progress</span><span id="banProgressText">0 / 0</span></div><div class="progress-track"><div class="progress-fill" id="banProgressFill"></div></div></div>
    <div class="log" id="banLogContainer"></div>
  </div>

  <!-- Unban Tab -->
  <div class="content-wrapper tab-content" id="tab-unban">
    <div class="form-row"><label>Target Username</label><input type="text" id="unbanUsername" placeholder="e.g. tiktok"></div>
    <div class="form-row"><label>Report Count</label><input type="number" id="unbanCount" value="10" min="1" max="1000"></div>
    <div class="btn-row"><button class="btn btn-start" id="unbanStartBtn">▶ Start</button><button class="btn btn-stop" id="unbanStopBtn" disabled>■ Stop</button></div>
    <div class="progress-container"><div class="progress-label"><span>Progress</span><span id="unbanProgressText">0 / 0</span></div><div class="progress-track"><div class="progress-fill" id="unbanProgressFill"></div></div></div>
    <div class="log" id="unbanLogContainer"></div>
  </div>

<script>
  // ============================================================
  //  PROXY CONFIG
  // ============================================================
  const PROXY = '/api/proxy?url=';
  const IG_APP_ID = '1217981644879628';
  const IG_UA = 'Instagram 219.0.0.12.117 Android (28/9; …)';

  // ---- helpers ----
  const rndHex = len => Array.from({length:len}, ()=>'0123456789abcdef'[Math.random()*16|0]).join('');
  const genGuid = ()=> 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=> {const r=Math.random()*16|0; return (c=='x'?r:r&0x3|0x8).toString(16);});
  const genDeviceId = ()=> rndHex(16);

  // ---- DOM refs ----
  const loginUsername=document.getElementById('loginUsername'),
        loginPassword=document.getElementById('loginPassword'),
        loginBtn=document.getElementById('loginBtn'),
        loginStatus=document.getElementById('loginStatus'),
        sessionIdInput=document.getElementById('sessionIdInput'),
        csrfTokenInput=document.getElementById('csrfTokenInput'),
        tabBanBtn=document.getElementById('tabBanBtn'),
        tabUnbanBtn=document.getElementById('tabUnbanBtn'),
        banTab=document.getElementById('tab-ban'),
        unbanTab=document.getElementById('tab-unban'),
        banUsername=document.getElementById('banUsername'),
        banCount=document.getElementById('banCount'),
        banStartBtn=document.getElementById('banStartBtn'),
        banStopBtn=document.getElementById('banStopBtn'),
        banProgressFill=document.getElementById('banProgressFill'),
        banProgressText=document.getElementById('banProgressText'),
        banLog=document.getElementById('banLogContainer'),
        unbanUsername=document.getElementById('unbanUsername'),
        unbanCount=document.getElementById('unbanCount'),
        unbanStartBtn=document.getElementById('unbanStartBtn'),
        unbanStopBtn=document.getElementById('unbanStopBtn'),
        unbanProgressFill=document.getElementById('unbanProgressFill'),
        unbanProgressText=document.getElementById('unbanProgressText'),
        unbanLog=document.getElementById('unbanLogContainer');

  // ---- global state ----
  let SESSION_ID = '', CSRF_TOKEN = '';
  let activeRun = { mode:null, controller:null };

  // ---- tab switching ----
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      if(activeRun.mode) return;
      document.querySelectorAll('.tab-btn, .tab-content').forEach(el=>el.classList.remove('active','visible'));
      b.classList.add('active');
      document.getElementById('tab-'+b.dataset.tab).classList.add('visible');
    });
  });

  // ---- proxy fetch (automatically includes session cookies via custom headers) ----
  async function proxyFetch(igUrl, {method='GET', headers={}, body=''} = {}) {
    const opts = {
      method,
      headers: {
        'Content-Type': method==='POST' ? 'application/x-www-form-urlencoded' : undefined,
        'X-IG-App-Id': IG_APP_ID,
        'User-Agent': IG_UA,
        'X-Requested-With': 'XMLHttpRequest',
        'X-IG-Sessionid': SESSION_ID,
        'X-IG-Csrftoken': CSRF_TOKEN,
        ...headers
      }
    };
    // cleanup undefined headers
    Object.keys(opts.headers).forEach(k => opts.headers[k]===undefined && delete opts.headers[k]);

    if (method==='POST' && body) {
      opts.body = typeof body === 'string' ? body : new URLSearchParams(body).toString();
    }

    const resp = await fetch(PROXY + encodeURIComponent(igUrl), opts);
    return resp;
  }

  // ---- extract cookies from X-IG-Cookies header ----
  function extractCookies(resp) {
    const cookieHeader = resp.headers.get('X-IG-Cookies');
    if (!cookieHeader) return {};
    const map = {};
    cookieHeader.split(',').forEach(pair => { // sometimes multiple Set-Cookie are comma-separated
      const parts = pair.split(';')[0].split('=');
      if (parts.length>=2) map[parts[0].trim()] = parts.slice(1).join('=');
    });
    return map;
  }

  // ---- LOGIN FLOW: 1) get pre‑login csrftoken, 2) POST login ----
  async function performLogin() {
    const user = loginUsername.value.trim(), pass = loginPassword.value.trim();
    if(!user||!pass) { loginStatus.textContent='❌ Enter username and password'; return; }
    loginBtn.disabled = true; loginStatus.textContent='⏳ Fetching CSRF token…';

    // Step 1: get a csrftoken cookie
    let initialCsrf = '';
    try {
      const preLoginResp = await proxyFetch('https://i.instagram.com/api/v1/', { method:'GET' });
      // the proxy forwards Set-Cookie as X-IG-Cookies
      const cookies = extractCookies(preLoginResp);
      if (cookies.csrftoken) {
        initialCsrf = cookies.csrftoken;
        // set it globally for login (but we haven't logged in yet, so CSRF_TOKEN is temporary)
        CSRF_TOKEN = initialCsrf;
        csrfTokenInput.value = initialCsrf; // show for debugging
        loginStatus.textContent = '🔑 CSRF token obtained. Logging in…';
      } else {
        // fallback: try a specific URL
        const fallbackResp = await proxyFetch('https://i.instagram.com/api/v1/web/login_page/', { method:'GET' });
        const fallbackCookies = extractCookies(fallbackResp);
        if (fallbackCookies.csrftoken) {
          initialCsrf = fallbackCookies.csrftoken;
          CSRF_TOKEN = initialCsrf;
          csrfTokenInput.value = initialCsrf;
        }
      }
    } catch (e) {
      loginStatus.textContent = '❌ Cannot reach Instagram. Check proxy or network.';
      loginBtn.disabled = false;
      return;
    }
    if (!initialCsrf) {
      // proceed without it – Instagram may still accept
      loginStatus.textContent = '⚠ No initial CSRF token, trying login without it…';
    }

    // Step 2: POST login
    const loginUrl = 'https://i.instagram.com/api/v1/accounts/login/';
    const bodyParams = {
      username: user,
      password: pass,
      device_id: genDeviceId(),
      guid: genGuid(),
      login_attempt_count: '0',
      _csrftoken: CSRF_TOKEN || 'missing',
      // Instagram mobile needs these
      phone_id: rndHex(16),
      _uid: rndHex(16),
      adid: rndHex(16),
    };

    try {
      const resp = await proxyFetch(loginUrl, { method:'POST', body: bodyParams });
      const text = await resp.text();
      let data;
      try { data = JSON.parse(text); }
      catch (e) {
        loginStatus.textContent = '❌ Instagram returned non‑JSON: ' + text.substring(0,150);
        loginBtn.disabled = false;
        return;
      }

      // Extract new cookies
      const cookies = extractCookies(resp);
      if (cookies.sessionid) {
        SESSION_ID = cookies.sessionid;
        sessionIdInput.value = SESSION_ID;
      }
      if (cookies.csrftoken) {
        CSRF_TOKEN = cookies.csrftoken;
        csrfTokenInput.value = CSRF_TOKEN;
      }

      // Check login status from JSON response
      if (data.status === 'ok' && data.logged_in_user) {
        loginStatus.textContent = '✅ Login successful. Cookies auto‑filled.';
        tabBanBtn.disabled = false;
        tabUnbanBtn.disabled = false;
      } else {
        const msg = data.message || (typeof data === 'string' ? data : 'Unknown error');
        loginStatus.textContent = '❌ Login failed: ' + msg;
      }
    } catch (e) {
      loginStatus.textContent = '❌ Network error: ' + e.message;
    }
    loginBtn.disabled = false;
  }
  loginBtn.addEventListener('click', performLogin);

  // ---- Get user ID ----
  async function getUserId(username) {
    const try1 = 'https://i.instagram.com/api/v1/users/' + encodeURIComponent(username) + '/usernameinfo/';
    let resp = await proxyFetch(try1);
    if (resp.ok) {
      const d = await resp.json();
      if (d.user && d.user.pk) return d.user.pk;
    }
    const try2 = 'https://i.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username);
    resp = await proxyFetch(try2);
    if (!resp.ok) throw new Error('User lookup HTTP '+resp.status);
    const d = await resp.json();
    if (d.data && d.data.user && d.data.user.id) return d.data.user.id;
    throw new Error('Cannot resolve user ID');
  }

  // ---- Log helper ----
  function addLog(container, msg, type='info') {
    const el = document.createElement('div');
    el.className = 'log-entry ' + type;
    const ts = new Date().toTimeString().slice(0,8);
    el.innerHTML = `<span class="log-timestamp">[${ts}]</span>${msg}`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  // ---- Delay ----
  const delay = ms => new Promise(r=>setTimeout(r,ms));

  // ---- Ban loop ----
  async function banLoop(username, count, ctrl) {
    const log = banLog; addLog(log, `Starting Ban for @${username}`, 'info');
    let userId; try { userId = await getUserId(username); addLog(log, `User ID: ${userId}`, 'success'); } catch(e) { addLog(log, e.message, 'error'); return; }
    const endpoint = `https://i.instagram.com/api/v1/users/${userId}/flag/`;
    const reasonIds = [1,2,3,4,5,6,7,8,9];
    let done=0;
    for(let i=0; i<count; i++) {
      if(ctrl.signal.aborted) break;
      const waitMs = 10000 + Math.floor(Math.random()*10001);
      addLog(log, `Waiting ${(waitMs/1000).toFixed(1)}s…`);
      await delay(waitMs);
      if(ctrl.signal.aborted) break;
      const p = {
        reason_id: reasonIds[Math.floor(Math.random()*reasonIds.length)],
        source_name:'profile', frx_context:'null',
        guid:genGuid(), device_id:genDeviceId()
      };
      try {
        const r = await proxyFetch(endpoint, { method:'POST', body: p });
        done++;
        if(r.ok) addLog(log, `Report #${i+1}/${count} ✓ ${r.status}`, 'success');
        else addLog(log, `Report #${i+1}/${count} ✗ ${r.status}`, 'error');
      } catch(e) {
        if(e.name==='AbortError') break;
        done++; addLog(log, `Report #${i+1}/${count} ✗ ${e.message}`, 'error');
      }
      updateProgress(count, done, 'ban');
    }
    addLog(log, `Ban finished: ${done}/${count}`, 'info');
  }

  // ---- Unban loop ----
  async function unbanLoop(username, count, ctrl) {
    const log = unbanLog; addLog(log, `Starting Unban for @${username}`, 'info');
    let userId; try { userId = await getUserId(username); addLog(log, `User ID: ${userId}`, 'success'); } catch(e) { addLog(log, e.message, 'error'); return; }
    const endpoint = `https://i.instagram.com/api/v1/users/${userId}/report/`;
    let done=0;
    for(let i=0; i<count; i++) {
      if(ctrl.signal.aborted) break;
      const waitMs = 10000 + Math.floor(Math.random()*10001);
      addLog(log, `Waiting ${(waitMs/1000).toFixed(1)}s…`);
      await delay(waitMs);
      if(ctrl.signal.aborted) break;
      const p = {
        flag_content:'ban_appeal', reason_id:'23',
        source_name:'profile', guid:genGuid(), device_id:genDeviceId()
      };
      try {
        const r = await proxyFetch(endpoint, { method:'POST', body:p });
        done++;
        if(r.ok) addLog(log, `Appeal #${i+1}/${count} ✓ ${r.status}`, 'success');
        else addLog(log, `Appeal #${i+1}/${count} ✗ ${r.status}`, 'error');
      } catch(e) {
        if(e.name==='AbortError') break;
        done++; addLog(log, `Appeal #${i+1}/${count} ✗ ${e.message}`, 'error');
      }
      updateProgress(count, done, 'unban');
    }
    addLog(log, `Unban finished: ${done}/${count}`, 'info');
  }

  function updateProgress(total, done, mode) {
    const pct = total ? Math.round(done/total*100) : 0;
    if(mode==='ban'){
      banProgressFill.style.width=pct+'%'; banProgressText.textContent=`${done} / ${total} (${pct}%)`;
    } else {
      unbanProgressFill.style.width=pct+'%'; unbanProgressText.textContent=`${done} / ${total} (${pct}%)`;
    }
  }

  async function startRun(mode) {
    if(activeRun.mode) return;
    if(!SESSION_ID||!CSRF_TOKEN) { alert('Login first.'); return; }
    const target = mode==='ban' ? banUsername.value.trim() : unbanUsername.value.trim();
    const count = parseInt(mode==='ban' ? banCount.value : unbanCount.value, 10);
    if(!target) { alert('Enter target username'); return; }
    if(isNaN(count)||count<1||count>1000) { alert('Count 1-1000'); return; }

    const ctrl = new AbortController();
    activeRun = { mode, controller:ctrl };

    if(mode==='ban'){
      banStartBtn.disabled=true; banStopBtn.disabled=false;
      banLog.innerHTML=''; banProgressFill.style.width='0'; banProgressText.textContent='0 / '+count;
      await banLoop(target, count, ctrl);
      banStartBtn.disabled=false; banStopBtn.disabled=true;
    } else {
      unbanStartBtn.disabled=true; unbanStopBtn.disabled=false;
      unbanLog.innerHTML=''; unbanProgressFill.style.width='0'; unbanProgressText.textContent='0 / '+count;
      await unbanLoop(target, count, ctrl);
      unbanStartBtn.disabled=false; unbanStopBtn.disabled=true;
    }
    activeRun = {};
  }
  function stopRun(){ if(activeRun.controller) activeRun.controller.abort(); }

  banStartBtn.addEventListener('click', ()=>startRun('ban'));
  banStopBtn.addEventListener('click', stopRun);
  unbanStartBtn.addEventListener('click', ()=>startRun('unban'));
  unbanStopBtn.addEventListener('click', stopRun);

  // initial
  banStopBtn.disabled = unbanStopBtn.disabled = true;
</script>
</body>
</html>
